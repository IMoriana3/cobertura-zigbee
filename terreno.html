<style>
  :root{--bg:#0B0F14;--panel:#121821;--line:#23303d;--line2:#2c3a49;--tx:#e7eef6;--tx2:#9fb2c4;--accent:#36D399;--mono:ui-monospace,monospace;--sans:system-ui,'Segoe UI',sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow:hidden}
  #cv{position:absolute;inset:0;display:block}
  header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:9px 14px;background:linear-gradient(#0b0f14ee,#0b0f1400);z-index:5;pointer-events:none}
  header a{pointer-events:auto;color:var(--tx2);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:5px 10px;font-size:13px}
  header h1{font-size:15px;margin:0;font-weight:700}

  .panel{position:absolute;left:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:240px;font-size:13px}
  .panel h2{margin:0 0 8px;font-size:13px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0}

  input[type=range]{accent-color:var(--accent)}

<body>

    </div>

    <div class="row"><label>Día (simulación)</label><input type="date" id="simdate" value="2026-06-17" style="font:inherit;font-size:12px;background:#1a2330;color:var(--tx);border:1px solid var(--line2);border-radius:6px;padding:3px 6px"></div>

<script>
"use strict";
var S=document.getElementById('status');
function setStatus(h){S.innerHTML=h;}
function log(m,cls){S.innerHTML+="\n"+(cls?'<span class="'+cls+'">'+m+'</span>':m);}
function $(id){return document.getElementById(id);}
function showBanner(text,bad){try{var b=$('diagBanner');if(!b){b=document.createElement('div');b.id='diagBanner';b.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:99999;padding:11px 14px;font:bold 14px/1.45 monospace;color:#fff;white-space:pre-wrap;box-shadow:0 2px 10px rgba(0,0,0,.55);cursor:pointer';b.onclick=function(){b.style.display='none';};document.body.appendChild(b);}b.style.background=bad?'#7a1f1f':'#1f5a3a';b.textContent='🔎 '+text+'\n(toca para cerrar)';b.style.display='block';}catch(_){}}
addEventListener('error',function(e){try{var m='JS error: '+((e.error&&e.error.message)||e.message||e)+'  @'+((e.filename||'').split('/').pop())+':'+(e.lineno||'?');log(m,'err');showBanner(m,true);}catch(_){}});
addEventListener('unhandledrejection',function(e){try{var m='promesa rechazada: '+((e.reason&&e.reason.message)||e.reason);log(m,'err');showBanner(m,true);}catch(_){}});
function diag(){   // diagnóstico de sombras: un solo NaN en una instancia que proyecta sombra corrompe el shadow map de TODA la escena; aquí lo detectamos y SANEAMOS (instancia NaN -> matriz cero finita)
  try{
    var nanc=0,info=[];
    function scan(name,im){ if(!im||!im.instanceMatrix)return; var a=im.instanceMatrix.array,cnt=(a.length/16)|0,bad=0,upd=false;
      for(var inst=0;inst<cnt;inst++){var b=inst*16,nan=false;for(var k=0;k<16;k++){if(!isFinite(a[b+k])){nan=true;break;}}
        if(nan){bad++;for(var k2=0;k2<16;k2++)a[b+k2]=0;upd=true;}}
      if(bad){nanc+=bad;info.push(name+':'+bad);} if(upd)im.instanceMatrix.needsUpdate=true; }
    if(typeof SEG!=='undefined'&&SEG)SEG.forEach(function(s){if(s.im)scan(s.key,s.im);});
    scan('poste',imPost);scan('eje',imShaft);scan('amortBody',imDampBody);
    var sm=(renderer&&renderer.shadowMap)?renderer.shadowMap.enabled:'?';
    var mtx=(renderer&&renderer.capabilities)?renderer.capabilities.maxTextureSize:'?';
    var sc=(SUN&&SUN.shadow)?SUN.shadow.camera:null;
    var bb={x0:1e9,x1:-1e9,z0:1e9,z1:-1e9};
    if(typeof TRK!=='undefined'&&TRK)TRK.forEach(function(t){if(t.gx<bb.x0)bb.x0=t.gx;if(t.gx>bb.x1)bb.x1=t.gx;if(t.gz<bb.z0)bb.z0=t.gz;if(t.gz>bb.z1)bb.z1=t.gz;});
    var lines=[
      'diag v2.66 · NaN='+nanc+(info.length?' ['+info.join(',')+']':''),
      'shadowMap='+sm+' tipo='+(renderer.shadowMap?renderer.shadowMap.type:'?')+' maxTex='+mtx,
      'SUN.cast='+(SUN?SUN.castShadow:'?')+' int='+(SUN?SUN.intensity.toFixed(2):'?')+' pos=('+(SUN?[(SUN.position.x|0),(SUN.position.y|0),(SUN.position.z|0)].join(','):'?')+')',
      'shadowCam LRTB='+(sc?[(sc.left|0),(sc.right|0),(sc.top|0),(sc.bottom|0)].join('/'):'?')+' n/f='+(sc?(sc.near|0)+'/'+(sc.far|0):'?')+' map='+((SUN&&SUN.shadow)?SUN.shadow.mapSize.x:'?')+' tex='+((SUN&&SUN.shadow&&SUN.shadow.map)?(SUN.shadow.map.width+'x'+SUN.shadow.map.height):'NULL'),
      'campo X['+(bb.x0|0)+','+(bb.x1|0)+'] Z['+(bb.z0|0)+','+(bb.z1|0)+']  (recuadro sombra: centro -66,36 ±'+(sc?Math.abs(sc.right|0):'?')+')'
    ];
    showBanner(lines.join('\n'), nanc>0); lines.forEach(function(l){log(l, nanc?'err':null);});
  }catch(e){ log('diag err: '+e.message,'err'); showBanner('diag err: '+e.message,true); }
}

var DEG=Math.PI/180;
function lon2txf(lon,z){return (lon+180)/360*Math.pow(2,z);}
function lat2tyf(lat,z){var r=lat*DEG;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
function loadImg(url){return new Promise(function(res,rej){var im=new Image();im.crossOrigin='anonymous';im.onload=function(){res(im);};im.onerror=function(){rej(new Error(url));};im.src=url;});}
async function mosaic(urlFn,z,latN,latS,lonW,lonE){
  var xmin=Math.floor(lon2txf(lonW,z)),xmax=Math.floor(lon2txf(lonE,z));
  var ymin=Math.floor(lat2tyf(latN,z)),ymax=Math.floor(lat2tyf(latS,z));
  var W=(xmax-xmin+1)*256,H=(ymax-ymin+1)*256;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var ok=0,fail=0,tasks=[];
  for(var tx=xmin;tx<=xmax;tx++)for(var ty=ymin;ty<=ymax;ty++){(function(tx,ty){
    tasks.push(loadImg(urlFn(z,tx,ty)).then(function(im){ctx.drawImage(im,(tx-xmin)*256,(ty-ymin)*256);ok++;}).catch(function(){fail++;}));})(tx,ty);}
  await Promise.all(tasks);
  return {ctx:ctx,canvas:cv,z:z,xmin:xmin,ymin:ymin,W:W,H:H,ok:ok,fail:fail,
    px:function(lat,lon){return {x:(lon2txf(lon,z)-xmin)*256,y:(lat2tyf(lat,z)-ymin)*256};}};
}
var SAT=function(z,x,y){return "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x;};
var DEM=function(z,x,y){return "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/"+z+"/"+x+"/"+y+".png";};

var renderer,scene,camera,controls,terrain,nodeGroup,labelGroup;
var NODES=[],mPerLat=111320,mPerLon=85000,lat0=41.5774,lon0=-0.7988,baseElev=0,vex=5,nsz=1;
var TRK=[],ANG=null,curMin=720,playing=false,PLAYSPEED=30,simDoy=168;
var freeCam=false,fYaw=0,fPitch=0,_md=false,_mx=0,_my=0,_eul=new THREE.Euler(0,0,0,'YXZ');
var ELEV=null,GWS=[{name:'N',lat:41.578,lon:-0.7988,h:2.5},{name:'S',lat:41.576,lon:-0.7988,h:2.5}],gwG=null,gwMasts=[],linkGroup=null,fresOn=false,placingGw=false,NCUMESH=null;
var LAYOUT=null,bosGroup=null,FB=null,_fAcc=0,CORRIDOR=23,NIDX=0,SIDX=1,LBL=[],labelsBuilt=false,corrGroup=null,CLP=null,HLBL=[];
var sunPathGroup=null,sunMarker=null,sunRay=null;
var SH_CX=-66,SH_CZ=36,SH_HALF=330;   // shadow camera FIJO ceñido a la planta (centro y semiancho en mundo); se calcula en build() por planta → sombras en TODA la planta

function projX(lon){return (lon-lon0)*mPerLon;}
function projZ(lat){return -(lat-lat0)*mPerLat;}

var KEYS={},_CF=new THREE.Vector3(),_CR=new THREE.Vector3(),_CUP=new THREE.Vector3(0,1,0),_CM=new THREE.Vector3();
function flyStep(dt){   // movimiento libre tipo vuelo: WASD desplaza, Q/E baja/sube, Shift acelera; mueve cámara+objetivo
  if(!camera||!controls)return;dt=Math.min(dt,0.05);
  var sp=(KEYS['ShiftLeft']||KEYS['ShiftRight']?300:100)*dt;_CM.set(0,0,0);
  camera.getWorldDirection(_CF);_CF.normalize();_CR.crossVectors(_CF,_CUP).normalize();
  if(KEYS['KeyW'])_CM.addScaledVector(_CF,sp);
  if(KEYS['KeyS'])_CM.addScaledVector(_CF,-sp);
  if(KEYS['KeyD'])_CM.addScaledVector(_CR,sp);
  if(KEYS['KeyA'])_CM.addScaledVector(_CR,-sp);
  if(KEYS['KeyE'])_CM.y+=sp;
  if(KEYS['KeyQ'])_CM.y-=sp;
  if(_CM.lengthSq()>1e-7){camera.position.add(_CM);controls.target.add(_CM);}
}
function initThree(){
  renderer=new THREE.WebGLRenderer({canvas:$('cv'),antialias:true});
  $('cv').addEventListener('webglcontextlost',function(e){e.preventDefault();showBanner('La GPU perdió el contexto WebGL en esta planta (sobrecarga de rendimiento, no un bug). Hay que aligerar más el render de la planta.',true);});   // diagnóstico: distingue pérdida de contexto (rendimiento) de un error JS
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
  if(THREE.sRGBEncoding)renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=(/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent))?THREE.PCFShadowMap:THREE.PCFSoftShadowMap;   // escritorio: PCFSoft (suaviza los bordes dentados "en sierra" de plantas grandes); móvil: PCF normal (PCFSoft no dibujaba sombras en algunas GPU móviles)
  if(THREE.ACESFilmicToneMapping){renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;}
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0b0f14);scene.fog=new THREE.Fog(0x0b0f14,1200,2800);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,9000);camera.position.set(0,360,460);
  controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.08;controls.maxPolarAngle=Math.PI*0.92;controls.minDistance=1.5;controls.maxDistance=7000;controls.screenSpacePanning=true;
  renderer.domElement.addEventListener('pointerdown',function(e){if(freeCam){_md=true;_mx=e.clientX;_my=e.clientY;}});   // cámara libre (vuelo): ratón = mirar
  addEventListener('pointermove',function(e){if(freeCam&&_md){fYaw-=(e.clientX-_mx)*0.0026;fPitch-=(e.clientY-_my)*0.0026;fPitch=Math.max(-1.5,Math.min(1.5,fPitch));_mx=e.clientX;_my=e.clientY;camera.quaternion.setFromEuler(_eul.set(fPitch,fYaw,0));}});
  addEventListener('pointerup',function(){_md=false;});
  renderer.domElement.addEventListener('click',function(e){ if(!placingGw||!terrain)return;   // mueve la NCU más cercana al punto pulsado
    var ray=new THREE.Raycaster();ray.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),camera);
    var hit=ray.intersectObject(terrain);if(!hit.length)return;var p=hit[0].point;
    var i=nearestNCU(p.x,p.z);GWS[i].lon=lon0+p.x/mPerLon;GWS[i].lat=lat0-p.z/mPerLat;
    placingGw=false;$('placeGw').textContent='📡 Mover NCU (clic)';
    if(!fresOn){fresOn=true;$('fres').checked=true;}applyFresnel();});
  renderer.domElement.addEventListener('pointerdown',function(e){if(!editMode||freeCam)return;var i=pickAt(e);if(i<0)return;   // EDICIÓN: pulsar un seguidor lo selecciona; si arrastras, lo recolocas (miss = la cámara sigue orbitando)
    selectTracker(i);dragTk=i;controls.enabled=false;var p=terrainPt(e);_dragOff.set(p?TRK[i].gx-p.x:0,0,p?TRK[i].gz-p.z:0);});
  addEventListener('pointermove',function(e){if(dragTk<0)return;var p=terrainPt(e);if(!p)return;var t=TRK[dragTk];t.gx=p.x+_dragOff.x;t.gz=p.z+_dragOff.z;resampleTracker(t);layoutTrackers();});   // arrastre: el seguidor se redrapea sobre el terreno en su nueva posición
  addEventListener('pointerup',function(){if(dragTk>=0){dragTk=-1;if(editMode&&!freeCam)controls.enabled=true;}});
  renderer.domElement.addEventListener('dblclick',function(e){if(placingGw||editMode||freeCam||!terrain)return;   // DOBLE-CLIC = ir a esa zona: recentra el pivot de órbita en el punto pulsado (manteniendo ángulo y distancia) → puedes recorrer toda la planta
    var ray=new THREE.Raycaster();ray.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),camera);var hit=ray.intersectObject(terrain);if(!hit.length)return;
    var p=hit[0].point,off=new THREE.Vector3().subVectors(camera.position,controls.target);controls.target.copy(p);camera.position.copy(p).add(off);controls.update();});
  SUN=new THREE.DirectionalLight(0xfff2d4,2.6);SUN.position.set(-360,300,300);SUN.castShadow=true;SUN._dir={E:-0.5,U:0.6,N:-0.5};scene.add(SUN);scene.add(SUN.target);var sun=SUN;
  var __hiShad=!/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);sun.shadow.mapSize.set(__hiShad?4096:2048,__hiShad?4096:2048);   // escritorio: 4096 (sombra fina); móvil: 2048 (memoria). El shadow camera se ciñe al zoom (updateSunShadow)
  var shc=sun.shadow.camera;shc.left=-520;shc.right=520;shc.top=520;shc.bottom=-520;shc.near=1;shc.far=2400;shc.updateProjectionMatrix();
  sun.shadow.bias=-0.0003;sun.shadow.normalBias=0.08;
  sun.shadow.radius=__hiShad?5:2;   // PENUMBRA PCFSoft: difumina ~5 téxeles → funde el "escalonado" del borde (la sombra de un panel de 6 cm es más fina que un téxel; sin radio el borde sale dentado y asimétrico). Radio en téxeles = independiente del zoom/mapSize
  scene.add(new THREE.HemisphereLight(0xb6d2ff,0x33291a,0.45));scene.add(new THREE.AmbientLight(0xffffff,0.08));   // poco relleno → sombras marcadas

  for(var i=1;i<N;i++){var f=i/N,lat=latA+(latB-latA)*f,lon=lonA+(lonB-lonA)*f,los=eA+(eB-eA)*f,terr=ELEV(lat,lon),obst=terr;
    if(Math.min(f,1-f)*D>4 && inField(lon,lat)) obst=terr+pth;          // dentro del campo, apantallan los paneles
    var r=Math.sqrt(lam*D*f*(1-f)),ratio=(los-obst)/(r||1e-6);if(ratio<worst)worst=ratio;}
  return{blocked:worst<0,partial:worst>=0&&worst<0.6};
}
function applyFresnel(){
  if(!linkGroup){linkGroup=new THREE.Group();scene.add(linkGroup);}
  while(linkGroup.children.length)linkGroup.remove(linkGroup.children[0]);
  if(!fresOn||!ELEV){updateFres(0,0,0);return;}
  positionGateways();
  var gwp=GWS.map(function(gw){return {x:projX(gw.lon),z:projZ(gw.lat),y:(ELEV(gw.lat,gw.lon)-baseElev)*vex+gw.h};});
  var pos=[],col=[],cl=0,pa=0,bl=0;
  function link(glat,glon,gx,gz,hA,ay,n){var i=(n>CORRIDOR)?NIDX:SIDX,gw=GWS[i],c=linkClearance(glat,glon,hA,gw.lat,gw.lon,gw.h),r,g,b; // asignación por pasillo central
    if(c.blocked){r=.886;g=.341;b=.298;bl++;}else if(c.partial){r=.890;g=.757;b=.286;pa++;}else{r=.212;g=.827;b=.6;cl++;}
    pos.push(gx,ay,gz,gwp[i].x,gwp[i].y,gwp[i].z);col.push(r,g,b,r,g,b);}
  TRK.forEach(function(t){var tp=t.aTip;if(tp){var hA=Math.max(0.1,(tp[1]-t.rel*vex)/vex);link(t.glat,t.glon,tp[0],tp[2],hA,tp[1],-t.gz);}else link(t.glat,t.glon,t.gx,t.gz,0.3,t.rel*vex+0.3,-t.gz);});   // el enlace sale de la PUNTA de la antena (no del centro entre filas); norte/sur del pasillo
  (LAYOUT.meteo||[]).forEach(function(m){var glat=lat0+m.n/mPerLat,glon=lon0+m.x/mPerLon;link(glat,glon,projX(glon),projZ(glat),6,(ELEV(glat,glon)-baseElev)*vex+6,m.n);}); // estación meteo: antena a 6 m
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  linkGroup.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.55})));
  updateFres(cl,pa,bl);
}
function updateFres(cl,pa,bl){var e=$('fresStat'),lg=$('fresLeg');if(!e)return;
  if(!fresOn){e.textContent='';if(lg)lg.style.display='none';return;}
  if(lg)lg.style.display='flex';
  e.innerHTML='Enlace de cada TCU a su NCU: <b style="color:#36D399">'+cl+'</b> con visión · <b style="color:#e3c149">'+pa+'</b> rozando · <b style="color:#e2574c">'+bl+'</b> sin visión';
}
function makeLabel(text){   // pastilla redondeada nítida, ancho ajustado al texto (no se aplasta)
  text=String(text==null?'':text);
  var dpr=2,fs=30,padX=16,padY=9,font='600 '+fs+'px system-ui,Segoe UI,Roboto,Arial,sans-serif';
  var mc=document.createElement('canvas').getContext('2d');mc.font=font;
  var tw=Math.ceil(mc.measureText(text).width),W=tw+padX*2,H=fs+padY*2;
  var c=document.createElement('canvas');c.width=W*dpr;c.height=H*dpr;
  var g=c.getContext('2d');g.scale(dpr,dpr);
  var r=H/2;g.beginPath();g.moveTo(r,0);g.arcTo(W,0,W,H,r);g.arcTo(W,H,0,H,r);g.arcTo(0,H,0,0,r);g.arcTo(0,0,W,0,r);g.closePath();
  g.fillStyle='rgba(14,18,24,.85)';g.fill();g.lineWidth=2;g.strokeStyle='rgba(90,169,255,.5)';g.stroke();
  g.fillStyle='#eaf4ff';g.font=font;g.textAlign='center';g.textBaseline='middle';g.fillText(text,W/2,H/2+1);
  var tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;tex.anisotropy=4;
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,transparent:true}));
  var h=4.0;sp.scale.set(h*W/H,h,1);return sp;
}

/* ───────── EDICIÓN DE SEGUIDORES EN 3D: seleccionar, articular (uno a uno) y recolocar sobre el terreno, con guardado ───────── */
function resampleTracker(t){ if(!ELEV)return;                          // al mover el seguidor: recalcula cotas y drape del terreno en el nuevo punto
  t.glat=lat0-t.gz/mPerLat;t.glon=lon0+t.gx/mPerLon;
  var sp=t.span||TC.span,dE=t.dE||15,fz=TC.filaZ,zP=TC.zP,latHalf=(sp/2)/mPerLat,lonE15=dE/mPerLon;
  t.rel=ELEV(t.glat,t.glon)-baseElev;
  t.relN=ELEV(t.glat+latHalf,t.glon)-baseElev;t.relS=ELEV(t.glat-latHalf,t.glon)-baseElev;
  t.relE=ELEV(t.glat,t.glon+lonE15)-baseElev;t.relW=ELEV(t.glat,t.glon-lonE15)-baseElev;
  var pr=[];for(var pf=0;pf<2;pf++){var pfx=pf?fz:-fz;for(var pk=0;pk<zP.length;pk++){var ppx=t.gx+pfx,ppz=t.gz+zP[pk];pr.push(ELEV(lat0-ppz/mPerLat,lon0+ppx/mPerLon)-baseElev);}}
  t.postRel=pr;
}
function buildPickBoxes(){                                             // una caja invisible por seguidor (raycast de selección) + un contorno de selección reutilizable
  if(pickGroup)nodeGroup.remove(pickGroup);
  pickGroup=new THREE.Group();nodeGroup.add(pickGroup);PICK=[];
  var pg=new THREE.BoxGeometry(1,1,1),pm=new THREE.MeshBasicMaterial({visible:false});   // material invisible: no se dibuja pero SÍ se puede pulsar (raycast)
  for(var i=0;i<TRK.length;i++){var m=new THREE.Mesh(pg,pm);m.scale.set(2*TC.filaZ+3,5,TRK[i].medio?36:64);m.userData.tk=i;pickGroup.add(m);PICK.push(m);}
  if(!selWire){selWire=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1,1,1)),new THREE.LineBasicMaterial({color:0x36D399}));selWire.material.depthTest=false;selWire.renderOrder=999;selWire.visible=false;scene.add(selWire);}
}
function applySavedTrackers(){                                         // al abrir: aplica posición y "articulado" guardados (por id del DWG) antes del primer layout
  var raw;try{raw=localStorage.getItem('cob3d_trackers');}catch(e){return;}if(!raw)return;var o;try{o=JSON.parse(raw);}catch(e){return;}
  for(var i=0;i<TRK.length;i++){var t=TRK[i],s=o[t.id!=null?t.id:('i'+i)];if(!s)continue;
    if(typeof s.artic==='boolean')t.artic=s.artic;
    if(typeof s.gx==='number'&&typeof s.gz==='number'){t.gx=s.gx;t.gz=s.gz;resampleTracker(t);}}
}
function saveTrackers(){                                               // guarda TODO el estado (posición + articulado) en el navegador → se reabre igual
  var o={};for(var i=0;i<TRK.length;i++){var t=TRK[i];o[t.id!=null?t.id:('i'+i)]={gx:t.gx,gz:t.gz,artic:!!t.artic};}
  var ok=true;try{localStorage.setItem('cob3d_trackers',JSON.stringify(o));}catch(e){ok=false;}
  $('edMsg').textContent=ok?'Guardado ✓ (se reabrirá así)':'No se pudo guardar';$('edMsg').style.color=ok?'#36D399':'#e2574c';$('edMsg').style.display='block';
}
function pickAt(e){if(!pickGroup)return -1;_v2.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);_pr.setFromCamera(_v2,camera);var h=_pr.intersectObjects(pickGroup.children,false);return h.length?h[0].object.userData.tk:-1;}
function terrainPt(e){if(!terrain)return null;_v2.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);_pr.setFromCamera(_v2,camera);var h=_pr.intersectObject(terrain);return h.length?h[0].point:null;}
function selectTracker(i){selIdx=i;
  if(i<0||!PICK[i]){if(selWire)selWire.visible=false;$('edSel').style.display='none';return;}
  selWire.visible=true;selWire.position.copy(PICK[i].position);selWire.scale.copy(PICK[i].scale);
  $('edSel').style.display='block';$('edNum').textContent=(TRK[i].id!=null?TRK[i].id:('#'+(i+1)));$('edArtic').checked=!!TRK[i].artic;$('edMsg').style.display='none';
}
$('edit').onchange=function(){editMode=this.checked;if(!editMode){selectTracker(-1);dragTk=-1;if(!freeCam)controls.enabled=true;}};
$('edArtic').onchange=function(){if(selIdx<0)return;TRK[selIdx].artic=this.checked;layoutTrackers();};   // articula/endereza SOLO el seleccionado
$('edSave').onclick=saveTrackers;
$('edReset').onclick=function(){if(selIdx<0)return;var t=TRK[selIdx];t.gx=t.gx0;t.gz=t.gz0;t.artic=kinked;resampleTracker(t);layoutTrackers();selectTracker(selIdx);};   // vuelve el seleccionado a su sitio del DWG y al estado maestro
$('vex').oninput=function(){vex=+this.value;$('vexV').textContent=vex+'×';if(terrain)terrain.scale.z=vex;layoutTrackers();buildBOS();buildCorridor();if(bosGroup)bosGroup.visible=$('bos').checked;if(fresOn)applyFresnel();};
$('bos').onchange=function(){if(bosGroup)bosGroup.visible=this.checked;};
$('bt').onchange=function(){btOn=this.checked;setTime(curMin);if(fresOn)applyFresnel();};   // backtracking on/off → cambia el sombreado entre filas
$('kink').onchange=function(){kinked=this.checked;for(var i=0;i<TRK.length;i++)TRK[i].artic=kinked;layoutTrackers();if(selIdx>=0)$('edArtic').checked=kinked;};   // maestro: articula/endereza TODOS (luego se afina uno a uno en edición)
$('sim').onchange=function(){simOn=this.checked;   // datos reales (telemetría) ↔ simulación astronómica (día completo)
  tMin=0;tMax=1440;   // 24 h completas en ambos modos (real / simulación)
  $('time').min=tMin;$('time').max=tMax;if(curMin<tMin)curMin=tMin;if(curMin>tMax)curMin=tMax;$('time').value=curMin;
  setTime(curMin);if(fresOn)applyFresnel();};
$('lbls').onchange=function(){if(this.checked)buildLabels();labelGroup.visible=this.checked;for(var k=0;k<HLBL.length;k++)HLBL[k].visible=this.checked;};
$('fres').onchange=function(){fresOn=this.checked;applyFresnel();};
$('sunpath').onchange=function(){if(sunPathGroup)sunPathGroup.visible=this.checked;};
$('placeGw').onclick=function(){placingGw=!placingGw;this.textContent=placingGw?'📡 clic para mover la NCU…':'📡 Mover NCU (clic)';};
$('reset').onclick=function(){controls.target.set(0,0,0);camera.position.set(0,300,420);controls.update();};
$('time').oninput=function(){playing=false;$('play').textContent='▶';setTime(+this.value);if(fresOn)applyFresnel();};
$('spd').oninput=function(){PLAYSPEED=+this.value;};   // velocidad de reproducción (min simulados por segundo real)
$('simdate').onchange=function(){var dt=new Date(this.value+'T12:00:00');if(isNaN(dt))return;simDoy=Math.floor((dt-new Date(dt.getFullYear(),0,0))/86400000);   // cualquier día del año
  if(!simOn){$('sim').checked=true;simOn=true;tMin=0;tMax=1440;$('time').min=tMin;$('time').max=tMax;$('time').value=curMin;}
  buildSunPath();setTime(curMin);if(fresOn)applyFresnel();};
$('freecam').onchange=function(){freeCam=this.checked;controls.enabled=!freeCam;
  var d=new THREE.Vector3();camera.getWorldDirection(d);
  if(freeCam){fYaw=Math.atan2(-d.x,-d.z);fPitch=Math.asin(Math.max(-1,Math.min(1,d.y)));}
  else{controls.target.copy(camera.position).addScaledVector(d,60);controls.update();}};
$('play').onclick=function(){playing=!playing;this.textContent=playing?'⏸':'▶';};
$('plantSel').value=PLANT;$('plantSel').onchange=function(){var u=new URL(location.href);u.searchParams.set('planta',this.value);location.href=u.href;};   // cambiar de planta = recargar con ?planta=…
if($('link2d')){var _l2=$('link2d');if(PLANT==='elburgo'){_l2.href='index.html';_l2.textContent='▦ Cobertura 2D →';}else{_l2.href='plano.html?planta='+PLANT;_l2.textContent='▦ Plano 2D →';}}   // El Burgo → visor REAL de cobertura Zigbee (RSSI/malla/saltos, index.html); Ayora/San José → plano de planta nuevo (sin datos de cobertura medidos)

build().catch(function(e){setStatus('<span class="err">Error: '+(e&&e.message||e)+'</span>\nConsola (F12) + captura, porfa.');});
</script>
