<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0B0F14">
<link rel="icon" href="favicon.svg">
<title>Cobertura 3D · El Burgo I — terreno real</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root{--bg:#0B0F14;--panel:#121821;--line:#23303d;--line2:#2c3a49;--tx:#e7eef6;--tx2:#9fb2c4;--accent:#36D399;--mono:ui-monospace,monospace;--sans:system-ui,'Segoe UI',sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow:hidden}
  #cv{position:absolute;inset:0;display:block}
  header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:9px 14px;background:linear-gradient(#0b0f14ee,#0b0f1400);z-index:5;pointer-events:none}
  header a{pointer-events:auto;color:var(--tx2);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:5px 10px;font-size:13px}
  header h1{font-size:15px;margin:0;font-weight:700}
  header .sub{color:var(--tx2);font-size:12px}
  header .brand{margin-left:auto;color:var(--accent);font-weight:700;font-size:13px}
  .panel{position:absolute;left:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:240px;font-size:13px}
  .panel h2{margin:0 0 8px;font-size:13px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0}
  .row label{flex:1;color:var(--tx2)}
  input[type=range]{accent-color:var(--accent)}
  .panel input[type=range]{width:120px}
  .btn{background:#1a2330;color:var(--tx);border:1px solid var(--line2);border-radius:8px;padding:6px 11px;font:inherit;font-size:12px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  #timebar{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 14px;display:flex;align-items:center;gap:12px;min-width:380px;max-width:60vw}
  #timebar input[type=range]{flex:1}
  #timebar .t{font-family:var(--mono);min-width:54px;text-align:center;font-size:15px;font-weight:700}
  #timebar .a{font-family:var(--mono);color:var(--accent);min-width:54px;text-align:right;font-size:12px}
  #status{position:absolute;right:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--mono);font-size:11.5px;color:var(--tx2);max-width:300px;white-space:pre-wrap;line-height:1.5}
  #status b{color:var(--accent)} .err{color:#e2574c}
</style>
</head>
<body>
  <canvas id="cv"></canvas>
  <header>
    <a href="https://imoriana3.github.io/cobertura-zigbee/">← Visor 2D</a>
    <div><h1>Cobertura 3D · El Burgo I</h1><div class="sub">Terreno real + seguidores (posición real) · v0.2</div></div>
    <span class="brand">Factiun</span>
  </header>
  <div class="panel">
    <h2>Vista</h2>
    <div class="row"><label>Exageración vertical</label><input type="range" id="vex" min="1" max="14" step="0.5" value="5"><span id="vexV" style="font-family:var(--mono)">5×</span></div>
    <div class="row"><label>Tamaño TCU</label><input type="range" id="nsz" min="0.3" max="3" step="0.1" value="1"></div>
    <div class="row"><label><input type="checkbox" id="lbls"> Etiquetas</label></div>
    <div class="row" style="margin-top:8px"><button class="btn" id="reset">◎ Centrar</button><span style="color:var(--tx2);font-size:11.5px">arrastra · rueda</span></div>
  </div>
  <div id="timebar">
    <button class="btn" id="play">▶</button>
    <span class="t" id="tval">12:00</span>
    <input type="range" id="time" min="0" max="840" step="1" value="720">
    <span class="a" id="aval">—</span>
  </div>
  <div id="status">iniciando…</div>
<script>
"use strict";
var S=document.getElementById('status');
function setStatus(h){S.innerHTML=h;}
function log(m,cls){S.innerHTML+="\n"+(cls?'<span class="'+cls+'">'+m+'</span>':m);}
function $(id){return document.getElementById(id);}

var DEG=Math.PI/180;
function lon2txf(lon,z){return (lon+180)/360*Math.pow(2,z);}
function lat2tyf(lat,z){var r=lat*DEG;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
function loadImg(url){return new Promise(function(res,rej){var im=new Image();im.crossOrigin='anonymous';im.onload=function(){res(im);};im.onerror=function(){rej(new Error(url));};im.src=url;});}
async function mosaic(urlFn,z,latN,latS,lonW,lonE){
  var xmin=Math.floor(lon2txf(lonW,z)),xmax=Math.floor(lon2txf(lonE,z));
  var ymin=Math.floor(lat2tyf(latN,z)),ymax=Math.floor(lat2tyf(latS,z));
  var W=(xmax-xmin+1)*256,H=(ymax-ymin+1)*256;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var ok=0,fail=0,tasks=[];
  for(var tx=xmin;tx<=xmax;tx++)for(var ty=ymin;ty<=ymax;ty++){(function(tx,ty){
    tasks.push(loadImg(urlFn(z,tx,ty)).then(function(im){ctx.drawImage(im,(tx-xmin)*256,(ty-ymin)*256);ok++;}).catch(function(){fail++;}));})(tx,ty);}
  await Promise.all(tasks);
  return {ctx:ctx,canvas:cv,z:z,xmin:xmin,ymin:ymin,W:W,H:H,ok:ok,fail:fail,
    px:function(lat,lon){return {x:(lon2txf(lon,z)-xmin)*256,y:(lat2tyf(lat,z)-ymin)*256};}};
}
var SAT=function(z,x,y){return "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x;};
var DEM=function(z,x,y){return "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/"+z+"/"+x+"/"+y+".png";};

var renderer,scene,camera,controls,terrain,nodeGroup,labelGroup;
var NODES=[],mPerLat=111320,mPerLon=85000,lat0=41.5774,lon0=-0.7988,baseElev=0,vex=5,nsz=1;
var TRK=[],ANG=null,curMin=720,playing=false,PLAYSPEED=70;

function projX(lon){return (lon-lon0)*mPerLon;}
function projZ(lat){return -(lat-lat0)*mPerLat;}

function initThree(){
  renderer=new THREE.WebGLRenderer({canvas:$('cv'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
  if(THREE.sRGBEncoding)renderer.outputEncoding=THREE.sRGBEncoding;
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0b0f14);scene.fog=new THREE.Fog(0x0b0f14,1200,2800);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,9000);camera.position.set(0,360,460);
  controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.08;controls.maxPolarAngle=Math.PI*0.49;
  var sun=new THREE.DirectionalLight(0xffffff,1.05);sun.position.set(-300,500,200);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x9fc0ff,0x202a16,0.55));
  nodeGroup=new THREE.Group();scene.add(nodeGroup);labelGroup=new THREE.Group();labelGroup.visible=false;scene.add(labelGroup);
  addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  var lastT=performance.now();
  (function loop(now){requestAnimationFrame(loop);var dt=(now-lastT)/1000;lastT=now;
    if(playing&&ANG){curMin+=dt*PLAYSPEED;if(curMin>ANG.maxT)curMin=ANG.minT;$('time').value=curMin;setTime(curMin);}
    controls.update();renderer.render(scene,camera);})(performance.now());
}

function hm2min(s){return (+s.slice(0,2))*60+(+s.slice(3,5));}
function fmtHM(m){m=Math.round(m);return ("0"+Math.floor(m/60)).slice(-2)+":"+("0"+(m%60)).slice(-2);}
async function loadAngles(){
  try{
    var j=await (await fetch('trackers_2026-06-17.json',{cache:'no-store'})).json();
    function toArr(o){return Object.keys(o).map(function(k){return [hm2min(k),o[k]];}).sort(function(a,b){return a[0]-b[0];});}
    ANG={date:j.date,fieldArr:toArr(j.field),trk:{}};
    Object.keys(j.trk).forEach(function(k){ANG.trk[k]=toArr(j.trk[k]);});
    ANG.minT=ANG.fieldArr[0][0];ANG.maxT=ANG.fieldArr[ANG.fieldArr.length-1][0];
    return true;
  }catch(e){ANG=null;return false;}
}
function interp(arr,min){
  if(!arr||!arr.length)return null;
  if(min<=arr[0][0])return arr[0][1];
  if(min>=arr[arr.length-1][0])return arr[arr.length-1][1];
  for(var i=1;i<arr.length;i++){if(arr[i][0]>=min){var a=arr[i-1],b=arr[i],f=(min-a[0])/((b[0]-a[0])||1);return a[1]+(b[1]-a[1])*f;}}
  return arr[arr.length-1][1];
}
function solarTilt(min){var h=min/60;if(h<5.2||h>20)return -5;var f=(h-5.2)/14.8;return -55+f*110;} // respaldo si no hay JSON
function angleAt(num,min){
  if(ANG){var v=(num&&ANG.trk[num])?interp(ANG.trk[num],min):interp(ANG.fieldArr,min);if(v!=null)return v;}
  return solarTilt(min);
}
function setTime(min){
  curMin=min;
  for(var i=0;i<TRK.length;i++){TRK[i].tg.rotation.z=angleAt(TRK[i].num,min)*DEG;}
  $('tval').textContent=fmtHM(min);
  $('aval').textContent=(ANG?(angleAt(null,min)).toFixed(0):solarTilt(min).toFixed(0))+"°";
}

async function build(){
  initThree();
  setStatus("Cargando coordenadas…");
  var txt;try{txt=await (await fetch('coords_ElBurgo_NCU1.csv',{cache:'no-store'})).text();}
  catch(e){setStatus('<span class="err">No se pudo cargar coords_ElBurgo_NCU1.csv</span>');return;}
  var lines=txt.trim().split(/\r?\n/);lines.shift();
  NODES=lines.map(function(l){var c=l.split(',');return {id:c[0],lat:+c[1],lon:+c[2],lbl:(c[3]||'').trim()};}).filter(function(n){return isFinite(n.lat)&&isFinite(n.lon);});
  var latN=-1e9,latS=1e9,lonW=1e9,lonE=-1e9;
  NODES.forEach(function(n){latN=Math.max(latN,n.lat);latS=Math.min(latS,n.lat);lonW=Math.min(lonW,n.lon);lonE=Math.max(lonE,n.lon);});
  lat0=(latN+latS)/2;lon0=(lonW+lonE)/2;mPerLon=111320*Math.cos(lat0*DEG);
  var plantW=Math.round((lonE-lonW)*mPerLon),plantD=Math.round((latN-latS)*mPerLat);
  var mlat=120/mPerLat,mlon=120/mPerLon;latN+=mlat;latS-=mlat;lonW-=mlon;lonE+=mlon;
  var widthM=(lonE-lonW)*mPerLon,depthM=(latN-latS)*mPerLat;
  setStatus("<b>"+NODES.length+"</b> seguidores · planta ≈ "+plantW+"×"+plantD+" m\nDescargando satélite + relieve…");

  var sat=null,dem=null,demImg=null;
  try{sat=await mosaic(SAT,18,latN,latS,lonW,lonE);}catch(e){}
  try{dem=await mosaic(DEM,14,latN,latS,lonW,lonE);demImg=dem.ctx.getImageData(0,0,dem.W,dem.H);}catch(e){}
  function elevAt(lat,lon){if(!demImg)return 0;var p=dem.px(lat,lon),ix=Math.max(0,Math.min(dem.W-1,Math.round(p.x))),iy=Math.max(0,Math.min(dem.H-1,Math.round(p.y))),i=(iy*dem.W+ix)*4,d=demImg.data;return (d[i]*256+d[i+1]+d[i+2]/256)-32768;}
  baseElev=elevAt(lat0,lon0);var emin=1e9,emax=-1e9;

  var geo=new THREE.PlaneGeometry(widthM,depthM,160,90),pos=geo.attributes.position,uv=geo.attributes.uv;
  for(var i=0;i<pos.count;i++){var lx=pos.getX(i),ly=pos.getY(i),lon=lon0+lx/mPerLon,lat=lat0+ly/mPerLat,e=elevAt(lat,lon);emin=Math.min(emin,e);emax=Math.max(emax,e);pos.setZ(i,e-baseElev);if(sat){var q=sat.px(lat,lon);uv.setXY(i,q.x/sat.W,1-q.y/sat.H);}}
  geo.computeVertexNormals();
  var mat;if(sat&&sat.ok>0){var tex=new THREE.CanvasTexture(sat.canvas);if(THREE.sRGBEncoding)tex.encoding=THREE.sRGBEncoding;mat=new THREE.MeshStandardMaterial({map:tex,roughness:.96,metalness:0});}else mat=new THREE.MeshStandardMaterial({color:0x2e3b2a,roughness:1,metalness:0});
  terrain=new THREE.Mesh(geo,mat);terrain.rotation.x=-Math.PI/2;terrain.scale.z=vex;scene.add(terrain);

  buildTrackers(elevAt);

  var haveAng=await loadAngles();
  if(ANG){$('time').min=ANG.minT;$('time').max=ANG.maxT;curMin=Math.min(720,ANG.maxT);}
  setTime(curMin);$('time').value=curMin;

  camera.position.set(0,Math.max(240,depthM*1.5),Math.max(360,widthM*0.85));controls.target.set(0,0,0);controls.update();
  setStatus("<b>"+NODES.length+"</b> seguidores · "+plantW+"×"+plantD+" m\n"+
    "satélite: "+(sat&&sat.ok?sat.ok+" teselas":"—")+" · relieve "+(demImg?(emax-emin).toFixed(1)+" m":"plano")+"\n"+
    "ángulos: "+(haveAng?("<b>"+ANG.date+"</b> ("+fmtHM(ANG.minT)+"–"+fmtHM(ANG.maxT)+")"):"<span class='err'>no cargados — curva aprox.</span>")+"\n▶ para reproducir el día");
}

var steelM,glassM,markM;
function buildTrackers(elevAt){
  nodeGroup.clear();labelGroup.clear();TRK=[];
  steelM=new THREE.MeshStandardMaterial({color:0x9aa3ac,roughness:.5,metalness:.6});
  glassM=new THREE.MeshStandardMaterial({color:0x0c1c2e,roughness:.22,metalness:.35,emissive:0x06101c,emissiveIntensity:.12});
  markM=new THREE.MeshStandardMaterial({color:0x36D399,emissive:0x0c2a1d,roughness:.4,metalness:.2});
  var chord=3.2,plen=7.0,postH=2.4;
  NODES.forEach(function(n){
    var x=projX(n.lon),z=projZ(n.lat),rel=elevAt(n.lat,n.lon)-baseElev;
    var mm=n.id.match(/(\d{3})(?!.*\d)/);var num=mm?mm[1]:null;
    var post=new THREE.Mesh(new THREE.BoxGeometry(0.13,postH,0.13),steelM);post.castShadow=true;nodeGroup.add(post);
    var tg=new THREE.Group();nodeGroup.add(tg);
    tg.add(new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,plen),steelM));
    var panel=new THREE.Mesh(new THREE.BoxGeometry(chord,0.05,plen),glassM);panel.position.y=0.10;panel.castShadow=true;tg.add(panel);
    var mark=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.3,10),markM);mark.position.set(chord*0.45,0.35,0);tg.add(mark);
    var lb=makeLabel(n.lbl||n.id);labelGroup.add(lb);
    TRK.push({tg:tg,post:post,mark:mark,lb:lb,x:x,z:z,rel:rel,num:num,postH:postH});
  });
  layoutTrackers();
}
function layoutTrackers(){
  TRK.forEach(function(t){var by=t.rel*vex;t.post.position.set(t.x,by+t.postH/2,t.z);t.tg.position.set(t.x,by+t.postH,t.z);t.mark.scale.setScalar(nsz);t.lb.position.set(t.x,by+t.postH+2.0,t.z);});
}
function makeLabel(text){
  var c=document.createElement('canvas');c.width=128;c.height=40;var g=c.getContext('2d');
  g.fillStyle='rgba(11,15,20,.72)';g.fillRect(0,0,128,40);g.fillStyle='#cfe';g.font='bold 22px sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText(text,64,21);
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,transparent:true}));sp.scale.set(15,4.7,1);return sp;
}

$('vex').oninput=function(){vex=+this.value;$('vexV').textContent=vex+'×';if(terrain)terrain.scale.z=vex;layoutTrackers();};
$('nsz').oninput=function(){nsz=+this.value;layoutTrackers();};
$('lbls').onchange=function(){labelGroup.visible=this.checked;};
$('reset').onclick=function(){controls.target.set(0,0,0);camera.position.set(0,300,420);controls.update();};
$('time').oninput=function(){playing=false;$('play').textContent='▶';setTime(+this.value);};
$('play').onclick=function(){playing=!playing;this.textContent=playing?'⏸':'▶';};

build().catch(function(e){setStatus('<span class="err">Error: '+(e&&e.message||e)+'</span>\nConsola (F12) + captura, porfa.');});
</script>
</body>
</html>
