<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0B0F14">

<title>Cobertura 3D · El Burgo I — terreno real</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root{--bg:#0B0F14;--panel:#121821;--line:#23303d;--line2:#2c3a49;--tx:#e7eef6;--tx2:#9fb2c4;--accent:#36D399;--mono:ui-monospace,monospace;--sans:system-ui,'Segoe UI',sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow:hidden}
  #cv{position:absolute;inset:0;display:block}
  header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:9px 14px;background:linear-gradient(#0b0f14ee,#0b0f1400);z-index:5;pointer-events:none}
  header a{pointer-events:auto;color:var(--tx2);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:5px 10px;font-size:13px}
  header h1{font-size:15px;margin:0;font-weight:700}
  header .sub{color:var(--tx2);font-size:12px}
  header .brand{margin-left:auto;color:var(--accent);font-weight:700;font-size:13px}
  .panel{position:absolute;left:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:240px;font-size:13px}
  .panel h2{margin:0 0 8px;font-size:13px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0}
  .row label{flex:1;color:var(--tx2)}
  input[type=range]{accent-color:var(--accent)}

  .btn{background:#1a2330;color:var(--tx);border:1px solid var(--line2);border-radius:8px;padding:6px 11px;font:inherit;font-size:12px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  #timebar{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 14px;display:flex;align-items:center;gap:12px;min-width:380px;max-width:60vw}
  #timebar input[type=range]{flex:1}
  #timebar .t{font-family:var(--mono);min-width:54px;text-align:center;font-size:15px;font-weight:700}
  #timebar .a{font-family:var(--mono);color:var(--accent);min-width:54px;text-align:right;font-size:12px}
  #status{position:absolute;right:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--mono);font-size:11.5px;color:var(--tx2);max-width:300px;white-space:pre-wrap;line-height:1.5}
  #status b{color:var(--accent)} .err{color:#e2574c}
</style>

<body>
  <canvas id="cv"></canvas>
  <header>
    <a href="https://imoriana3.github.io/cobertura-zigbee/">← Visor 2D</a>
    <div><h1>Cobertura 3D · El Burgo I</h1><div class="sub">Implantación real (DWG): 215 seguidores + CTs, inversores, CCTV, vallado, viales · v1.1</div></div>
    <span class="brand">Factiun</span>
  </header>
  <div class="panel">
    <h2>Vista</h2>
    <div class="row"><label>Exageración vertical</label><input type="range" id="vex" min="1" max="14" step="0.5" value="5"><span id="vexV" style="font-family:var(--mono)">5×</span></div>
    <div class="row"><label>Tamaño TCU</label><input type="range" id="nsz" min="0.3" max="3" step="0.1" value="1"></div>
    <div class="row"><label><input type="checkbox" id="lbls"> Etiquetas</label></div>
    <div class="row"><label><input type="checkbox" id="bos" checked> Instalaciones (CT, inversores, CCTV, vallado)</label></div>
    <div class="row"><label><input type="checkbox" id="fres"> LOS / Fresnel (NCU)</label></div>
    <div class="row"><button class="btn" id="placeGw">📡 Situar NCU</button></div>
    <div class="row" id="fresLeg" style="display:none;gap:10px;font-size:11px;color:var(--tx2)"><span><span style="color:#36D399">●</span> ok</span><span><span style="color:#e3c149">●</span> Fresnel</span><span><span style="color:#e2574c">●</span> sin visión</span></div>
    <div class="row" id="fresStat" style="font-size:11px;color:var(--tx2)"></div>
    <div class="row" style="margin-top:8px"><button class="btn" id="reset">◎ Centrar</button><span style="color:var(--tx2);font-size:11.5px">arrastra · rueda</span></div>
  </div>
  <div id="timebar">
    <button class="btn" id="play">▶</button>
    <span class="t" id="tval">12:00</span>
    <input type="range" id="time" min="0" max="840" step="1" value="720">
    <span class="a" id="aval">—</span>
  </div>
  <div id="status">iniciando…</div>
<script>
"use strict";
var S=document.getElementById('status');
function setStatus(h){S.innerHTML=h;}
function log(m,cls){S.innerHTML+="\n"+(cls?'<span class="'+cls+'">'+m+'</span>':m);}
function $(id){return document.getElementById(id);}

var DEG=Math.PI/180;
function lon2txf(lon,z){return (lon+180)/360*Math.pow(2,z);}
function lat2tyf(lat,z){var r=lat*DEG;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
function loadImg(url){return new Promise(function(res,rej){var im=new Image();im.crossOrigin='anonymous';im.onload=function(){res(im);};im.onerror=function(){rej(new Error(url));};im.src=url;});}
async function mosaic(urlFn,z,latN,latS,lonW,lonE){
  var xmin=Math.floor(lon2txf(lonW,z)),xmax=Math.floor(lon2txf(lonE,z));
  var ymin=Math.floor(lat2tyf(latN,z)),ymax=Math.floor(lat2tyf(latS,z));
  var W=(xmax-xmin+1)*256,H=(ymax-ymin+1)*256;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var ok=0,fail=0,tasks=[];
  for(var tx=xmin;tx<=xmax;tx++)for(var ty=ymin;ty<=ymax;ty++){(function(tx,ty){
    tasks.push(loadImg(urlFn(z,tx,ty)).then(function(im){ctx.drawImage(im,(tx-xmin)*256,(ty-ymin)*256);ok++;}).catch(function(){fail++;}));})(tx,ty);}
  await Promise.all(tasks);
  return {ctx:ctx,canvas:cv,z:z,xmin:xmin,ymin:ymin,W:W,H:H,ok:ok,fail:fail,
    px:function(lat,lon){return {x:(lon2txf(lon,z)-xmin)*256,y:(lat2tyf(lat,z)-ymin)*256};}};
}
var SAT=function(z,x,y){return "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x;};
var DEM=function(z,x,y){return "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/"+z+"/"+x+"/"+y+".png";};

var renderer,scene,camera,controls,terrain,nodeGroup,labelGroup;
var NODES=[],mPerLat=111320,mPerLon=85000,lat0=41.5774,lon0=-0.7988,baseElev=0,vex=5,nsz=1;
var TRK=[],ANG=null,curMin=720,playing=false,PLAYSPEED=70;
var ELEV=null,GW={lat:41.578,lon:-0.7988,h:6},gwGroup=null,linkGroup=null,fresOn=false,placingGw=false,clearM,partM,blockM;
var LAYOUT=null,bosGroup=null;

function projX(lon){return (lon-lon0)*mPerLon;}
function projZ(lat){return -(lat-lat0)*mPerLat;}

function initThree(){
  renderer=new THREE.WebGLRenderer({canvas:$('cv'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
  if(THREE.sRGBEncoding)renderer.outputEncoding=THREE.sRGBEncoding;
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0b0f14);scene.fog=new THREE.Fog(0x0b0f14,1200,2800);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,9000);camera.position.set(0,360,460);
  controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.08;controls.maxPolarAngle=Math.PI*0.49;
  renderer.domElement.addEventListener('click',function(e){ if(!placingGw||!terrain)return;   // situar la NCU con un clic en el terreno
    var ray=new THREE.Raycaster();ray.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),camera);
    var hit=ray.intersectObject(terrain);if(!hit.length)return;var p=hit[0].point;
    GW.lon=lon0+p.x/mPerLon;GW.lat=lat0-p.z/mPerLat;placingGw=false;$('placeGw').textContent='📡 Situar NCU';
    if(!fresOn){fresOn=true;$('fres').checked=true;}applyFresnel();});
  var sun=new THREE.DirectionalLight(0xffffff,1.05);sun.position.set(-300,500,200);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x9fc0ff,0x202a16,0.55));
  nodeGroup=new THREE.Group();scene.add(nodeGroup);labelGroup=new THREE.Group();labelGroup.visible=false;scene.add(labelGroup);
  addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  var lastT=performance.now();
  (function loop(now){requestAnimationFrame(loop);var dt=(now-lastT)/1000;lastT=now;
    if(playing){var _mx=ANG?ANG.maxT:840,_mn=ANG?ANG.minT:0;curMin+=dt*PLAYSPEED;if(curMin>_mx)curMin=_mn;if(curMin<_mn)curMin=_mn;$('time').value=curMin;setTime(curMin);}
    controls.update();renderer.render(scene,camera);})(performance.now());
}

function hm2min(s){return (+s.slice(0,2))*60+(+s.slice(3,5));}
function fmtHM(m){m=Math.round(m);return ("0"+Math.floor(m/60)).slice(-2)+":"+("0"+(m%60)).slice(-2);}
async function loadAngles(){
  try{
    var j=await (await fetch('trackers_2026-06-17.json',{cache:'no-store'})).json();
    function toArr(o){return Object.keys(o).map(function(k){return [hm2min(k),o[k]];}).sort(function(a,b){return a[0]-b[0];});}
    ANG={date:j.date,fieldArr:toArr(j.field),trk:{}};
    Object.keys(j.trk).forEach(function(k){ANG.trk[k]=toArr(j.trk[k]);});
    ANG.minT=ANG.fieldArr[0][0];ANG.maxT=ANG.fieldArr[ANG.fieldArr.length-1][0];
    return true;
  }catch(e){ANG=null;return false;}
}
function interp(arr,min){
  if(!arr||!arr.length)return null;
  if(min<=arr[0][0])return arr[0][1];
  if(min>=arr[arr.length-1][0])return arr[arr.length-1][1];
  for(var i=1;i<arr.length;i++){if(arr[i][0]>=min){var a=arr[i-1],b=arr[i],f=(min-a[0])/((b[0]-a[0])||1);return a[1]+(b[1]-a[1])*f;}}
  return arr[arr.length-1][1];
}
function solarTilt(min){var h=min/60;if(h<5.2||h>20)return -5;var f=(h-5.2)/14.8;return -55+f*110;} // respaldo si no hay JSON
function angleAt(num,min){
  if(ANG){var v=(num&&ANG.trk[num])?interp(ANG.trk[num],min):interp(ANG.fieldArr,min);if(v!=null)return v;}
  return solarTilt(min);
}
function setTime(min){
  curMin=min;
  for(var i=0;i<TRK.length;i++){var a=angleAt(TRK[i].num,min)*DEG;TRK[i].filas[0].rotation.z=a;TRK[i].filas[1].rotation.z=a;}
  $('tval').textContent=fmtHM(min);
  $('aval').textContent=(ANG?(angleAt(null,min)).toFixed(0):solarTilt(min).toFixed(0))+"°";
}

async function build(){
  initThree();
  setStatus("Cargando implantación (DWG)…");
  try{LAYOUT=await (await fetch('elburgo_layout.json',{cache:'no-store'})).json();}
  catch(e){setStatus('<span class="err">No se pudo cargar elburgo_layout.json</span>');return;}
  lat0=LAYOUT.clat;lon0=LAYOUT.clon;mPerLon=111320*Math.cos(lat0*DEG);                 // centroide real (UTM30N → lat/lon)
  NODES=LAYOUT.trackers.map(function(t){return {gx:t.x,gz:-t.n,glat:lat0+t.n/mPerLat,glon:lon0+t.x/mPerLon,num:null,id:t.id,rot:t.rot};}); // posiciones reales del DWG (metros locales E/N)
  var exmin=1e9,exmax=-1e9,nmin=1e9,nmax=-1e9;
  function ext(x,n){exmin=Math.min(exmin,x);exmax=Math.max(exmax,x);nmin=Math.min(nmin,n);nmax=Math.max(nmax,n);}
  NODES.forEach(function(n){ext(n.gx,-n.gz);});
  ['fence','roads','cts','cctv'].forEach(function(k){(LAYOUT[k]||[]).forEach(function(pl){pl.forEach(function(p){ext(p[0],p[1]);});});});
  var marg=70,hx=Math.max(Math.abs(exmin),Math.abs(exmax))+marg,hz=Math.max(Math.abs(nmin),Math.abs(nmax))+marg;
  var widthM=2*hx,depthM=2*hz;
  var lonW=lon0-hx/mPerLon,lonE=lon0+hx/mPerLon,latS=lat0-hz/mPerLat,latN=lat0+hz/mPerLat;
  var plantW=Math.round(exmax-exmin),plantD=Math.round(nmax-nmin);
  setStatus("<b>"+NODES.length+"</b> seguidores (DWG) · planta ≈ "+plantW+"×"+plantD+" m\nDescargando satélite + relieve…");

  var sat=null,dem=null,demImg=null;
  try{sat=await mosaic(SAT,18,latN,latS,lonW,lonE);}catch(e){}
  try{dem=await mosaic(DEM,14,latN,latS,lonW,lonE);demImg=dem.ctx.getImageData(0,0,dem.W,dem.H);}catch(e){}
  function elevAt(lat,lon){if(!demImg)return 0;var p=dem.px(lat,lon),ix=Math.max(0,Math.min(dem.W-1,Math.round(p.x))),iy=Math.max(0,Math.min(dem.H-1,Math.round(p.y))),i=(iy*dem.W+ix)*4,d=demImg.data;return (d[i]*256+d[i+1]+d[i+2]/256)-32768;}
  baseElev=elevAt(lat0,lon0);var emin=1e9,emax=-1e9;

  var geo=new THREE.PlaneGeometry(widthM,depthM,160,90),pos=geo.attributes.position,uv=geo.attributes.uv;
  for(var i=0;i<pos.count;i++){var lx=pos.getX(i),ly=pos.getY(i),lon=lon0+lx/mPerLon,lat=lat0+ly/mPerLat,e=elevAt(lat,lon);emin=Math.min(emin,e);emax=Math.max(emax,e);pos.setZ(i,e-baseElev);if(sat){var q=sat.px(lat,lon);uv.setXY(i,q.x/sat.W,1-q.y/sat.H);}}
  geo.computeVertexNormals();
  var mat;if(sat&&sat.ok>0){var tex=new THREE.CanvasTexture(sat.canvas);if(THREE.sRGBEncoding)tex.encoding=THREE.sRGBEncoding;mat=new THREE.MeshStandardMaterial({map:tex,roughness:.96,metalness:0});}else mat=new THREE.MeshStandardMaterial({color:0x2e3b2a,roughness:1,metalness:0});
  terrain=new THREE.Mesh(geo,mat);terrain.rotation.x=-Math.PI/2;terrain.scale.z=vex;scene.add(terrain);

  buildTrackers(elevAt);
  ELEV=elevAt;                                                                 // guarda el muestreo de cota para el análisis Fresnel
  var gN=-1e9;NODES.forEach(function(n){gN=Math.max(gN,n.glat);});GW.lat=gN+40/mPerLat;GW.lon=lon0;  // NCU por defecto al norte del campo (editable)
  buildGateway();positionGateway();buildBOS();if(fresOn)applyFresnel();

  var haveAng=await loadAngles();
  if(ANG){$('time').min=ANG.minT;$('time').max=ANG.maxT;curMin=Math.min(540,ANG.maxT);}
  setTime(curMin);$('time').value=curMin;

  camera.position.set(0,Math.max(240,depthM*1.5),Math.max(360,widthM*0.85));controls.target.set(0,0,0);controls.update();
  setStatus("<b>"+NODES.length+"</b> seguidores · "+plantW+"×"+plantD+" m\n"+
    "satélite: "+(sat&&sat.ok?sat.ok+" teselas":"—")+" · relieve "+(demImg?(emax-emin).toFixed(1)+" m":"plano")+"\n"+
    "ángulos: "+(haveAng?("<b>"+ANG.date+"</b> ("+fmtHM(ANG.minT)+"–"+fmtHM(ANG.maxT)+")"):"<span class='err'>no cargados — curva aprox.</span>")+"\n▶ para reproducir el día");
}

// La etiqueta "1.B.P" define una rejilla 18 bloques × 2 columnas × 3 filas (=108).
// El GPS de latitud viene MUY ruidoso (y corrupto en los bloques oeste). El Este sí es
// fiable. Anclamos una rejilla limpia a la geometría real: columnas por ajuste lineal del
// Este (bloques buenos) y 3 filas por la MEDIANA del Norte de los bloques buenos.
var ROWC=[0,0,0],NPITCH=64;
function gridRepair(){
  function bp(l){var p=(''+l).split('.');var B=+p[1]||1,P=+p[2]||1;return {B:B,sub:P<=3?0:1,row:(P-1)%3,P:P};}
  function median(a){if(!a.length)return 0;var b=a.slice().sort(function(x,y){return x-y;});var h=b.length>>1;return b.length%2?b[h]:(b[h-1]+b[h])/2;}
  var bl={};
  NODES.forEach(function(n){n._b=bp(n.lbl);n._e=projX(n.lon);n._n=-projZ(n.lat);(bl[n._b.B]=bl[n._b.B]||[]).push(n._n);});
  var good={};Object.keys(bl).forEach(function(B){var a=bl[B];if(Math.max.apply(null,a)-Math.min.apply(null,a)>80)good[B]=1;});
  var rn=[[],[],[]],xs=[],ys=[];
  NODES.forEach(function(n){var b=n._b;if(good[b.B]&&b.P<=6){rn[b.row].push(n._n);xs.push((b.B-1)*2+b.sub);ys.push(n._e);}});
  ROWC=[median(rn[0]),median(rn[1]),median(rn[2])];
  NPITCH=Math.abs(ROWC[0]-ROWC[2])/2||64;
  var m=xs.length,sx=0,sy=0,sxx=0,sxy=0;for(var i=0;i<m;i++){sx+=xs[i];sy+=ys[i];sxx+=xs[i]*xs[i];sxy+=xs[i]*ys[i];}
  var A=m?(m*sxy-sx*sy)/(m*sxx-sx*sx):12,B0=m?(sy-A*sx)/m:0;
  if(!isFinite(A)){A=12;B0=0;}
  var used={};   // rejilla continua; los huecos reales (corredores) se colocarán con el DWG de implantación
  NODES.forEach(function(n){var b=n._b,col=(b.B-1)*2+b.sub,row=b.row,k=col+','+row;
    while(used[k]){col++;k=col+','+row;}used[k]=1;                     // P7 (nodo extra) → columna libre
    var gcol=col-(b.B<=6?GAP:0);                                       // abre el hueco entre bloque 6 y 7
    var gE=A*gcol+B0,gN=ROWC[row];                                     // rejilla limpia: columnas reales + 3 filas medianas
    n.gx=gE;n.gz=-gN;n.glat=lat0+gN/mPerLat;n.glon=lon0+gE/mPerLon;});
}
var steelM,glassM,markM,blueM,darkM,tcuM,panelTex;
// Textura FV real del gemelo digital: rejilla 6×12 de células azul oscuro con busbars.
function makePanelTex(){
  var W=128,H=256,c=document.createElement('canvas');c.width=W;c.height=H;var x=c.getContext('2d');
  x.fillStyle='#0a1019';x.fillRect(0,0,W,H);
  var nx=6,ny=12,cw=W/nx,ch=H/ny,gap=1.4;
  for(var iy=0;iy<ny;iy++)for(var ix=0;ix<nx;ix++){
    var L=7.5+Math.random()*3.5;var g=x.createLinearGradient(ix*cw,iy*ch,ix*cw+cw,iy*ch+ch);
    g.addColorStop(0,'hsl(214,48%,'+(L+2).toFixed(1)+'%)');g.addColorStop(1,'hsl(214,48%,'+L.toFixed(1)+'%)');
    x.fillStyle=g;x.fillRect(ix*cw+gap,iy*ch+gap,cw-2*gap,ch-2*gap);
    x.strokeStyle='rgba(150,175,200,.30)';x.lineWidth=0.8;
    for(var b=1;b<=3;b++){var bx=ix*cw+cw*b/4;x.beginPath();x.moveTo(bx,iy*ch+gap);x.lineTo(bx,iy*ch+ch-gap);x.stroke();}
  }
  var t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=4;return t;
}
// Seguidor REAL de El Burgo, replicado del gemelo digital (cotas reales): BIFILA = 2 filas
// gemelas (1V) a ±3 m, tubo de torsión N-S de ~64,7 m (2 mesas de 28 módulos + hueco del
// motor central), slew drive azul + motor y TCU colgada de la viga oeste. Versión "campo"
// (sin sombras ni geometría por módulo) para que entren los 108 sin morir el navegador.
function buildTrackers(elevAt){
  nodeGroup.clear();labelGroup.clear();TRK=[];
  steelM=new THREE.MeshStandardMaterial({color:0x9aa3ac,roughness:.45,metalness:.65});
  blueM=new THREE.MeshStandardMaterial({color:0x2f5fb0,roughness:.4,metalness:.4});
  darkM=new THREE.MeshStandardMaterial({color:0x1a1c20,roughness:.5,metalness:.55});
  tcuM=new THREE.MeshStandardMaterial({color:0x232f3b,roughness:.5,metalness:.3});
  markM=new THREE.MeshStandardMaterial({color:0x36D399,emissive:0x0c2a1d,roughness:.4,metalness:.2});
  var modW=1.134,modH=2.382,gapMod=0.012,gapDrive=0.55,modsPerStr=28;          // cotas reales del gemelo
  var pitchX=modW+gapMod,strLen=modsPerStr*pitchX,off=0.14,span=2*strLen+gapDrive,filaZ=3.0,postH=2.0;
  var mesaC=gapDrive/2+strLen/2;                                                // centro de cada mesa (N y S)
  panelTex=makePanelTex();panelTex.repeat.set(1,modsPerStr);                    // 28 módulos a lo largo del tubo
  glassM=new THREE.MeshStandardMaterial({map:panelTex,color:0xffffff,roughness:.14,metalness:.1,emissive:0x0a1626,emissiveIntensity:.07});
  var zP=[-28,-9,9,28];                                                         // postes (4 por fila, fijos)
  function add(geo,mat,par,px,py,pz){var m=new THREE.Mesh(geo,mat);m.position.set(px||0,py||0,pz||0);par.add(m);return m;}
  NODES.forEach(function(n){
    var x=n.gx,z=n.gz,rel=elevAt(n.glat,n.glon)-baseElev;
    var latHalf=(span/2)/mPerLat,dE=15,lonE15=dE/mPerLon;                      // cota alrededor del tubo para orientarlo al terreno (N-S a lo largo del tubo, E-O lateral)
    var relN=elevAt(n.glat+latHalf,n.glon)-baseElev,relS=elevAt(n.glat-latHalf,n.glon)-baseElev;
    var relE=elevAt(n.glat,n.glon+lonE15)-baseElev,relW=elevAt(n.glat,n.glon-lonE15)-baseElev;
    var mm=n.id.match(/(\d{3})(?!.*\d)/);var num=mm?mm[1]:null;
    var T=new THREE.Group();nodeGroup.add(T);var filas=[];
    [-filaZ,filaZ].forEach(function(fx){
      var g=new THREE.Group();g.position.set(fx,postH,0);T.add(g);             // grupo que bascula sobre su tubo
      add(new THREE.BoxGeometry(0.12,0.12,span),steelM,g,0,0,0);               // tubo de torsión (eje N-S)
      [mesaC,-mesaC].forEach(function(zc){add(new THREE.BoxGeometry(modH,0.05,strLen),glassM,g,0,off,zc);}); // mesa N y mesa S (28 módulos c/u)
      zP.forEach(function(zp){add(new THREE.BoxGeometry(0.13,postH,0.13),steelM,T,fx,postH/2,zp);});         // postes
      filas.push(g);
    });
    var et=add(new THREE.CylinderGeometry(0.05,0.05,2*filaZ,10),steelM,T,0,postH,0);et.rotation.z=Math.PI/2; // eje de transmisión
    add(new THREE.BoxGeometry(0.34,0.4,0.3),blueM,T,0,postH,0);                                              // slew drive (reductora azul)
    var mot=add(new THREE.CylinderGeometry(0.09,0.09,0.5,14),darkM,T,0,postH-0.04,-0.55);mot.rotation.x=Math.PI/2; // motor
    var west=filas[0];                                                                                       // viga OESTE (-x)
    add(new THREE.BoxGeometry(0.5,0.26,0.36),tcuM,west,0,-0.22,1.4);                                         // TCU colgada de la viga oeste
    var mark=add(new THREE.ConeGeometry(0.4,1.0,12),markM,west,0,-0.55,1.4);                                 // marcador del nodo TCU
    var lb=makeLabel(n.lbl||n.id);labelGroup.add(lb);
    TRK.push({T:T,filas:filas,mark:mark,lb:lb,x:x,z:z,rel:rel,relN:relN,relS:relS,relE:relE,relW:relW,span:span,dE:dE,num:num,postH:postH,glat:n.glat,glon:n.glon});
  });
  layoutTrackers();
}
var _UP=new THREE.Vector3(0,1,0),_NRM=new THREE.Vector3();
function layoutTrackers(){
  TRK.forEach(function(t){var by=t.rel*vex;
    t.T.position.set(t.x,by,t.z);
    // DRAPE: orienta cada seguidor al plano del terreno (pendiente N-S del tubo + pendiente E-O lateral)
    var cl=0.45/vex;                                                          // límite de pendiente (~±24° ya exagerada)
    var gN=Math.max(-cl,Math.min(cl,(t.relN-t.relS)/t.span));                 // pendiente Norte (a lo largo del tubo)
    var gE=Math.max(-cl,Math.min(cl,(t.relE-t.relW)/(2*t.dE)));               // pendiente Este (lateral)
    _NRM.set(-vex*gE,1,vex*gN).normalize();                                   // normal del terreno exagerado (x=Este, z=Sur)
    t.T.quaternion.setFromUnitVectors(_UP,_NRM);
    t.mark.scale.setScalar(nsz);t.lb.position.set(t.x,by+t.postH+3,t.z);});
}
/* ---------- Implantación real (DWG): vallado, CTs, inversores, CCTV, viales, comunicaciones ---------- */
function localElevY(x,n){ return (ELEV(lat0+n/mPerLat,lon0+x/mPerLon)-baseElev)*vex; }   // cota del terreno (exagerada) en un punto local E/N
function buildBOS(){
  if(bosGroup)scene.remove(bosGroup);
  bosGroup=new THREE.Group();scene.add(bosGroup);
  if(!LAYOUT||!ELEV)return;
  // viales
  var rp=[];(LAYOUT.roads||[]).forEach(function(pl){for(var i=0;i+1<pl.length;i++){var a=pl[i],b=pl[i+1];rp.push(a[0],localElevY(a[0],a[1])+0.4,-a[1],b[0],localElevY(b[0],b[1])+0.4,-b[1]);}});
  if(rp.length){var rg=new THREE.BufferGeometry();rg.setAttribute('position',new THREE.Float32BufferAttribute(rp,3));bosGroup.add(new THREE.LineSegments(rg,new THREE.LineBasicMaterial({color:0xc2ab78,transparent:true,opacity:.55})));}
  // vallado: alambre superior + postes
  var fp=[],fh=2.0,postM=new THREE.MeshStandardMaterial({color:0x8a949e,roughness:.6,metalness:.4});
  (LAYOUT.fence||[]).forEach(function(pl){
    for(var i=0;i+1<pl.length;i++){var a=pl[i],b=pl[i+1];fp.push(a[0],localElevY(a[0],a[1])+fh,-a[1],b[0],localElevY(b[0],b[1])+fh,-b[1]);}
    var acc=0;for(var i=0;i<pl.length;i++){var p=pl[i];if(i>0)acc+=Math.hypot(p[0]-pl[i-1][0],p[1]-pl[i-1][1]);
      if(i===0||acc>=9){acc=0;var y=localElevY(p[0],p[1]);var po=new THREE.Mesh(new THREE.BoxGeometry(0.1,fh,0.1),postM);po.position.set(p[0],y+fh/2,-p[1]);bosGroup.add(po);}}
  });
  if(fp.length){var fg=new THREE.BufferGeometry();fg.setAttribute('position',new THREE.Float32BufferAttribute(fp,3));bosGroup.add(new THREE.LineSegments(fg,new THREE.LineBasicMaterial({color:0xcfd8e0,transparent:true,opacity:.45})));}
  // CTs / edificios (caja del bbox de cada huella)
  var bldM=new THREE.MeshStandardMaterial({color:0xc9cdd2,roughness:.85,metalness:.1});
  (LAYOUT.cts||[]).forEach(function(pl){var x0=1e9,x1=-1e9,n0=1e9,n1=-1e9;pl.forEach(function(p){x0=Math.min(x0,p[0]);x1=Math.max(x1,p[0]);n0=Math.min(n0,p[1]);n1=Math.max(n1,p[1]);});
    var w=x1-x0,dp=n1-n0;if(w<1.5||dp<1.5||w>80||dp>80)return;var cx=(x0+x1)/2,cn=(n0+n1)/2,h=3.5,y=localElevY(cx,cn);
    var b=new THREE.Mesh(new THREE.BoxGeometry(w,h,dp),bldM);b.position.set(cx,y+h/2,-cn);bosGroup.add(b);});
  // inversores string (caja en cada etiqueta)
  var invM=new THREE.MeshStandardMaterial({color:0x33414f,roughness:.5,metalness:.45});
  (LAYOUT.invlab||[]).forEach(function(c){var y=localElevY(c.x,c.n);var b=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.5,0.5),invM);b.position.set(c.x,y+0.75,-c.n);bosGroup.add(b);});
  // CCTV: SOLO la ubicación de cada cámara (sin alcances), poste + cámara en el vértice del abanico
  var camM=new THREE.MeshStandardMaterial({color:0x12181f,roughness:.5}),poleM=new THREE.MeshStandardMaterial({color:0xbfc7cf,roughness:.5,metalness:.5});
  (LAYOUT.cctvcam||[]).forEach(function(c){var x=c[0],n=c[1],y=localElevY(x,n),ph=5;
    var pole=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,ph,8),poleM);pole.position.set(x,y+ph/2,-n);bosGroup.add(pole);
    var cam=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.2,0.5),camM);cam.position.set(x,y+ph,-n);bosGroup.add(cam);
    var dot=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,6),new THREE.MeshStandardMaterial({color:0xe2574c,emissive:0x5a120e}));dot.position.set(x,y+ph,-n+0.28);bosGroup.add(dot);});
  // equipos de comunicaciones (mástiles)
  var comM=new THREE.MeshStandardMaterial({color:0x5aa9ff,emissive:0x12283e,roughness:.5});
  (LAYOUT.comms||[]).forEach(function(pl){var cx=0,cn=0;pl.forEach(function(p){cx+=p[0];cn+=p[1];});cx/=pl.length;cn/=pl.length;var y=localElevY(cx,cn),h=4;
    var m=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.09,h,8),comM);m.position.set(cx,y+h/2,-cn);bosGroup.add(m);
    var s=new THREE.Mesh(new THREE.SphereGeometry(0.35,12,8),comM);s.position.set(cx,y+h,-cn);bosGroup.add(s);});
}
/* ---------- Punto 4: LOS / Fresnel TCU ↔ NCU sobre el terreno real ---------- */
function buildGateway(){
  if(gwGroup)return;
  gwGroup=new THREE.Group();gwGroup.visible=false;scene.add(gwGroup);
  var mat=new THREE.MeshStandardMaterial({color:0xdfe7ef,roughness:.4,metalness:.5});
  var mast=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.17,GW.h,10),mat);mast.position.y=GW.h/2;gwGroup.add(mast);
  var ant=new THREE.Mesh(new THREE.SphereGeometry(0.55,16,12),new THREE.MeshStandardMaterial({color:0x5aa9ff,emissive:0x163a5e,emissiveIntensity:.6}));ant.position.y=GW.h;gwGroup.add(ant);
  var lb=makeLabel('NCU');lb.position.y=GW.h+2.6;gwGroup.add(lb);
}
function positionGateway(){ if(gwGroup&&ELEV) gwGroup.position.set(projX(GW.lon),(ELEV(GW.lat,GW.lon)-baseElev)*vex,projZ(GW.lat)); }
// despeje de la 1ª zona de Fresnel a 2,4 GHz con cotas REALES (no exageradas): ratio<0 = sin visión, <0.6 = invade Fresnel
function linkClearance(latA,lonA,hA,latB,lonB,hB){
  var eA=ELEV(latA,lonA)+hA,eB=ELEV(latB,lonB)+hB,dE=(lonB-lonA)*mPerLon,dN=(latB-latA)*mPerLat,D=Math.hypot(dE,dN);
  if(D<2)return{blocked:false,partial:false};
  var lam=0.125,worst=9,N=Math.max(10,Math.min(80,Math.round(D/6)));
  for(var i=1;i<N;i++){var f=i/N,los=eA+(eB-eA)*f,g=ELEV(latA+(latB-latA)*f,lonA+(lonB-lonA)*f),r=Math.sqrt(lam*D*f*(1-f)),ratio=(los-g)/(r||1e-6);if(ratio<worst)worst=ratio;}
  return{blocked:worst<0,partial:worst>=0&&worst<0.6};
}
function fresMats(){ if(clearM)return;
  clearM=new THREE.MeshStandardMaterial({color:0x36D399,emissive:0x0c2a1d,roughness:.4,metalness:.2});
  partM=new THREE.MeshStandardMaterial({color:0xe3c149,emissive:0x3a2f08,roughness:.4,metalness:.2});
  blockM=new THREE.MeshStandardMaterial({color:0xe2574c,emissive:0x3a120e,roughness:.4,metalness:.2});
}
function applyFresnel(){
  if(!linkGroup){linkGroup=new THREE.Group();scene.add(linkGroup);}
  while(linkGroup.children.length)linkGroup.remove(linkGroup.children[0]);
  if(!fresOn||!ELEV){if(gwGroup)gwGroup.visible=false;TRK.forEach(function(t){t.mark.material=markM;});updateFres(0,0,0);return;}
  fresMats();gwGroup.visible=true;positionGateway();
  var gwX=projX(GW.lon),gwZ=projZ(GW.lat),gwY=(ELEV(GW.lat,GW.lon)-baseElev)*vex+GW.h,pos=[],col=[],cl=0,pa=0,bl=0;
  TRK.forEach(function(t){
    var c=linkClearance(t.glat,t.glon,2.2,GW.lat,GW.lon,GW.h),r,g,b;
    if(c.blocked){t.mark.material=blockM;r=.886;g=.341;b=.298;bl++;}
    else if(c.partial){t.mark.material=partM;r=.890;g=.757;b=.286;pa++;}
    else{t.mark.material=clearM;r=.212;g=.827;b=.6;cl++;}
    var ay=t.rel*vex+2.3;pos.push(t.x,ay,t.z,gwX,gwY,gwZ);col.push(r,g,b,r,g,b);
  });
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  linkGroup.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.5})));
  updateFres(cl,pa,bl);
}
function updateFres(cl,pa,bl){var e=$('fresStat'),lg=$('fresLeg');if(!e)return;
  if(!fresOn){e.textContent='';if(lg)lg.style.display='none';return;}
  if(lg)lg.style.display='flex';
  e.innerHTML='<b style="color:#36D399">'+cl+'</b> ok · <b style="color:#e3c149">'+pa+'</b> Fresnel · <b style="color:#e2574c">'+bl+'</b> sin visión';
}
function makeLabel(text){
  var c=document.createElement('canvas');c.width=128;c.height=40;var g=c.getContext('2d');
  g.fillStyle='rgba(11,15,20,.72)';g.fillRect(0,0,128,40);g.fillStyle='#cfe';g.font='bold 22px sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText(text,64,21);
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,transparent:true}));sp.scale.set(15,4.7,1);return sp;
}

$('vex').oninput=function(){vex=+this.value;$('vexV').textContent=vex+'×';if(terrain)terrain.scale.z=vex;layoutTrackers();buildBOS();if(bosGroup)bosGroup.visible=$('bos').checked;if(fresOn)applyFresnel();};
$('bos').onchange=function(){if(bosGroup)bosGroup.visible=this.checked;};
$('nsz').oninput=function(){nsz=+this.value;layoutTrackers();};
$('lbls').onchange=function(){labelGroup.visible=this.checked;};
$('fres').onchange=function(){fresOn=this.checked;applyFresnel();};
$('placeGw').onclick=function(){placingGw=!placingGw;this.textContent=placingGw?'📡 clic en el terreno…':'📡 Situar NCU';};
$('reset').onclick=function(){controls.target.set(0,0,0);camera.position.set(0,300,420);controls.update();};
$('time').oninput=function(){playing=false;$('play').textContent='▶';setTime(+this.value);};
$('play').onclick=function(){playing=!playing;this.textContent=playing?'⏸':'▶';};

build().catch(function(e){setStatus('<span class="err">Error: '+(e&&e.message||e)+'</span>\nConsola (F12) + captura, porfa.');});
</script>
