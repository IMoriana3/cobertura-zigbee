<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Plano 2D Cobertura</title>
<meta name="theme-color" content="#0b0f14">
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="app-icon.svg"><link rel="icon" href="favicon.svg">
<script>if('serviceWorker'in navigator)addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});</script>
<style>
  :root{--bg:#0b0f14;--panel:#121821ee;--tx:#eaf4ff;--tx2:#9bb0c6;--line:#1f2a37;--line2:#2b3a4d;--accent:#5aa9ff;--mono:ui-monospace,Menlo,Consolas,monospace;--sans:system-ui,Segoe UI,Roboto,sans-serif}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow:hidden;-webkit-user-select:none;user-select:none}
  #cv{position:absolute;inset:0;display:block;touch-action:none;cursor:grab}
  #cv.drag{cursor:grabbing}
  header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:9px 14px;background:linear-gradient(#0b0f14ee,#0b0f1400);z-index:5;pointer-events:none}
  header a{pointer-events:auto;color:var(--tx2);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:5px 10px;font-size:13px}
  header h1{font-size:15px;margin:0;font-weight:700;display:flex;align-items:baseline;gap:7px}
  header select{pointer-events:auto;font:inherit;font-size:.82em;color:#eaf4ff;background:#1a2330;border:1px solid var(--line2);border-radius:8px;padding:2px 8px;cursor:pointer}
  header .sub{color:var(--tx2);font-size:12px}
  header .brand{margin-left:auto;color:var(--accent);font-weight:700;font-size:13px}
  .panel{position:absolute;left:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;min-width:190px}
  .row{display:flex;align-items:center;gap:8px;margin:4px 0}
  .row label{cursor:pointer}
  .btn{background:#1a2330;color:var(--tx);border:1px solid var(--line2);border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;cursor:pointer}
  .leg{font-size:11.5px;color:var(--tx2);line-height:1.7}
  .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}
  #status{position:absolute;right:14px;bottom:14px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-family:var(--mono);font-size:11.5px;color:var(--tx2);max-width:300px;white-space:pre-wrap;line-height:1.5}
  .err{color:#ff6b6b}
  #tip{position:absolute;z-index:6;pointer-events:none;background:#0e1218e6;border:1px solid var(--line2);border-radius:7px;padding:5px 8px;font-size:12px;opacity:0;transition:opacity .1s;max-width:220px}
  #tip b{color:#9fd0ff}
</style></head><body>
<canvas id="cv"></canvas>
<header>
  <a id="link3d" href="terreno.html">▦ Ver en 3D →</a>
  <div><h1>Plano 2D Cobertura<span style="opacity:.5">·</span><select id="plantSel"><option value="elburgo">El Burgo I</option><option value="ayora">Ayora 24025</option><option value="sanjose">San José 24019</option></select></h1><div class="sub">v1.7</div></div>
  <button id="offBtn" title="Modo sin conexión: no descarga el satélite (cero llamadas externas)" style="pointer-events:auto;background:#1a2330;color:#9bb0c6;border:1px solid var(--line2);border-radius:8px;padding:4px 9px;font:inherit;font-size:12px;cursor:pointer"></button>
  <span class="brand">Factiun</span>
</header>
<div class="panel">
  <div class="row"><label><input type="checkbox" id="cbSat" checked> Satélite</label></div>
  <div class="row"><label><input type="checkbox" id="cbTrk" checked> Seguidores</label></div>
  <div class="row"><label><input type="checkbox" id="cbNcu" checked> NCUs / meteo</label></div>
  <div class="row"><label><input type="checkbox" id="cbLbl"> Etiquetas</label></div>
  <div class="row"><label><input type="checkbox" id="cbElec"> ⚡ Color eléctrico (NCU)</label></div>
  <div class="row"><label title="Pile reveal: cuánto se hinca cada pilote (del suelo al tubo), calculado del relieve real. Rojo = más hincado. Como en el 3D y en S.P.A.C.E."><input type="checkbox" id="cbPile"> ⛰️ Pile reveal (hincado)</label></div>
  <div class="row"><label title="Capa de inversores (DC): colorea por inversor, dibuja el cableado string→inversor y el símbolo del DWG. Clic en un inversor → ficha (SG350HX · MPPT · BoM). Solo El Burgo."><input type="checkbox" id="cbInv"> 🔌 Inversor (DC)</label></div>
  <div class="row" style="margin-top:6px"><button class="btn" id="fit">◎ Encajar</button><span style="color:var(--tx2);font-size:11.5px">arrastra · rueda</span></div>
  <div class="leg" id="legStatic" style="margin-top:7px"><span class="dot" style="background:#3a78d6"></span>seguidor &nbsp; <span class="dot" style="background:#36D399;border-radius:50%"></span>NCU &nbsp; <span class="dot" style="background:#e3c149;border-radius:50%"></span>meteo</div>
  <div class="leg" id="legElec" style="margin-top:7px;display:none;max-height:210px;overflow:auto"></div>
  <div class="leg" id="legPile" style="margin-top:7px;display:none"></div>
  <div class="leg" id="legInv" style="margin-top:7px;display:none;max-height:230px;overflow:auto"></div>
</div>
<div id="status">cargando…</div>
<div id="tip"></div>
<div id="fichaInv" style="position:absolute;top:54px;right:14px;z-index:7;display:none;background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:12px 14px;font-size:12.5px;max-width:300px;max-height:calc(100% - 80px);overflow:auto;line-height:1.45"></div>
<script>
"use strict";
var DEG=Math.PI/180;
function $(id){return document.getElementById(id);}
function setStatus(h){$('status').innerHTML=h;}
function lon2txf(lon,z){return (lon+180)/360*Math.pow(2,z);}
function lat2tyf(lat,z){var r=lat*DEG;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
function tx2lon(tx,z){return tx/Math.pow(2,z)*360-180;}
function ty2lat(ty,z){var n=Math.PI*(1-2*ty/Math.pow(2,z));return Math.atan(Math.sinh(n))*180/Math.PI;}
function loadImg(url){return new Promise(function(res,rej){var im=new Image();im.crossOrigin='anonymous';im.onload=function(){res(im);};im.onerror=function(){rej(new Error(url));};im.src=url;});}
var SAT=function(z,x,y){return "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x;};
async function mosaic(z,latN,latS,lonW,lonE){
  var xmin=Math.floor(lon2txf(lonW,z)),xmax=Math.floor(lon2txf(lonE,z));
  var ymin=Math.floor(lat2tyf(latN,z)),ymax=Math.floor(lat2tyf(latS,z));
  var W=(xmax-xmin+1)*256,H=(ymax-ymin+1)*256;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var ok=0,tasks=[];
  for(var tx=xmin;tx<=xmax;tx++)for(var ty=ymin;ty<=ymax;ty++){(function(tx,ty){
    tasks.push(loadImg(SAT(z,tx,ty)).then(function(im){ctx.drawImage(im,(tx-xmin)*256,(ty-ymin)*256);ok++;}).catch(function(){}));})(tx,ty);}
  await Promise.all(tasks);
  return {canvas:cv,z:z,xmin:xmin,ymin:ymin,xmax:xmax,ymax:ymax,W:W,H:H,ok:ok};
}

var PLANTS={ elburgo:{file:'elburgo_layout.json',title:'El Burgo I'}, ayora:{file:'ayora_layout.json',title:'Ayora 24025'}, sanjose:{file:'sanjose_layout.json',title:'San José 24019'}, custom:{file:null,title:'Planta nueva'} };
var PLANT=(function(){try{var p=new URLSearchParams(location.search).get('planta');return (p==='custom')?'custom':(PLANTS[p]?p:'elburgo');}catch(e){return 'elburgo';}})();
var OFFLINE=(function(){try{var s=localStorage.getItem('cobertura_offline');return s===null?!navigator.onLine:s==='1';}catch(e){return !navigator.onLine;}})();   // modo offline: sin satélite, cero llamadas externas

/* ===== capa ELÉCTRICA: colorea cada seguidor por su NCU (asignación canónica) =====
   Usa t.ncu del layout (lo emite el creador canónico de SolarGPT; real p.ej. en San José);
   si el layout no lo trae, asigna por NCU más cercana. 100% offline (solo lee el layout). */
var COD={elburgo:24002,ayora:24025,sanjose:24019};
var SPEC=(function(){try{var m=JSON.parse(localStorage.getItem('factiun_plantas')||'null');var c=COD[PLANT];return (m&&c&&m[String(c)])||null;}catch(e){return null;}})();   // ficha de la planta (Cartera técnica) para anotar/validar la leyenda
var EGROUPS=[],ECOL={};
function ehsl(i){var h=(i*137.508)%360;return 'hsl('+h.toFixed(0)+',62%,56%)';}   // ángulo áureo → colores bien separados
function nearestNcu(t){if(!L.ncus||!L.ncus.length)return 0;var bd=1e18,bi=0;for(var i=0;i<L.ncus.length;i++){var dx=L.ncus[i].x-t.x,dn=L.ncus[i].n-t.n,d=dx*dx+dn*dn;if(d<bd){bd=d;bi=i;}}return bi;}
function ncuLabel(key,idx){if(L&&L.ncus){if(typeof key==='number'&&L.ncus[key-1]&&L.ncus[key-1].name)return L.ncus[key-1].name;if(L.ncus[idx]&&L.ncus[idx].name)return L.ncus[idx].name;}return 'NCU '+key;}
function assignElec(){
  EGROUPS=[];ECOL={};if(!L||!L.trackers)return;
  var byKey={},order=[],hasNcu=L.trackers.some(function(t){return t.ncu!=null;});
  L.trackers.forEach(function(t){var key,idx;
    if(hasNcu&&t.ncu!=null){key=t.ncu;idx=(typeof key==='number'?key-1:-1);}
    else{idx=nearestNcu(t);key=idx+1;}
    t._g=key;if(!(key in byKey)){byKey[key]={key:key,idx:idx,count:0};order.push(key);}byKey[key].count++;});
  order.sort(function(a,b){return (typeof a==='number'&&typeof b==='number')?a-b:String(a).localeCompare(String(b));});
  order.forEach(function(key,i){var g=byKey[key];g.name=ncuLabel(key,g.idx);g.color=ehsl(i);EGROUPS.push(g);ECOL[key]=g.color;});
}
function buildElecLegend(){
  var box=$('legElec'),stat=$('legStatic');if(!box)return;
  if(!$('cbElec').checked){box.style.display='none';if(stat)stat.style.display='';return;}
  if(stat)stat.style.display='none';
  var declared=SPEC?((SPEC.ncu_eth||0)+(SPEC.ncu_fo||0)):null;
  var head='<div style="color:#eaf4ff;margin-bottom:5px;white-space:nowrap">'+(SPEC&&SPEC.nombre?SPEC.nombre+' · ':'')+EGROUPS.length+' NCU · '+(L.trackers?L.trackers.length:0)+' seguidores'+(declared!=null?' <span style="color:var(--tx2)">· cartera: '+declared+'</span>':'')+'</div>';
  var rows=EGROUPS.map(function(g){return '<div style="white-space:nowrap"><span class="dot" style="background:'+g.color+'"></span>'+g.name+' <span style="color:var(--tx2)">· '+g.count+'</span></div>';}).join('');
  box.innerHTML=head+rows;box.style.display='';
}

/* ===== capa INVERSORES (DC): color por inversor + cableado string→inversor + ficha SG350HX =====
   El id del seguidor codifica grupo.inversor.seguidor (p.ej. "1.10.3") y L.invlab da la posición y
   etiqueta de cada inversor (extraído del DWG de El Burgo). L.inverters son los rectángulos del símbolo.
   100% offline (sólo lee el layout). */
var INVG=[],INVH={},INVSEL=null;
function invKeyOf(id){var p=String(id).split('.');return (p.length>=3&&/^\d+$/.test(p[0])&&/^\d+$/.test(p[1]))?p[0]+'.'+p[1]:null;}   // sólo ids tipo g.i.s numéricos (El Burgo)
function hasInv(){return !!(L&&L.invlab&&L.invlab.length);}
function strPerTrk(t){return /medio|corto/i.test(t.t||'')?2:4;}   // estimación de strings: bífila larga 4, medio/corto 2 (afinable con el string-schedule de Xamai)
function assignInv(){
  INVG=[];INVH={};if(!L||!L.trackers)return;
  L.trackers.forEach(function(t,i){var k=invKeyOf(t.id);t._inv=k;if(k==null)return;var g=INVH[k];if(!g){g={key:k,label:'I-'+k,trk:[],sx:0,sn:0,x:null,n:null};INVH[k]=g;INVG.push(g);}g.trk.push(i);g.sx+=t.x;g.sn+=t.n;});
  (L.invlab||[]).forEach(function(v){var k=String(v.s).replace(/^I-/,'');if(INVH[k]){INVH[k].x=v.x;INVH[k].n=v.n;INVH[k].label=v.s;}});
  INVG.sort(function(a,b){return a.key.localeCompare(b.key,undefined,{numeric:true});});
  INVG.forEach(function(g,i){var h=((i*7)*137.508)%360;g.color='hsl('+h.toFixed(0)+',62%,56%)';g.colorA='hsla('+h.toFixed(0)+',62%,62%,0.30)';if(g.x==null){g.x=g.sx/g.trk.length;g.n=g.sn/g.trk.length;}});   // *7 separa más los matices; posición = etiqueta del DWG o centroide
}
function buildInvLegend(){
  var box=$('legInv');if(!box)return;
  if(!$('cbInv').checked){box.style.display='none';return;}
  $('legStatic').style.display='none';$('legElec').style.display='none';$('legPile').style.display='none';
  if(!hasInv()){box.innerHTML='<div style="color:var(--tx2)">Sin datos de inversor en esta planta<br>(disponible en El Burgo, del DWG)</div>';box.style.display='';return;}
  var dN=(SPEC&&SPEC.inv!=null)?SPEC.inv:null;
  var head='<div style="color:#eaf4ff;margin-bottom:5px">'+INVG.length+' inversores · '+(L.trackers?L.trackers.length:0)+' seg'+(dN!=null?' <span style="color:var(--tx2)">· cartera: '+dN+'</span>':'')+'<div style="color:var(--tx2);font-weight:400;font-size:11px;margin-top:2px">clic en un inversor → ficha</div></div>';
  var rows=INVG.map(function(g){return '<div style="white-space:nowrap;cursor:pointer" onclick="openFicha(\''+g.key+'\')"><span class="dot" style="background:'+g.color+'"></span>'+g.label+' <span style="color:var(--tx2)">· '+g.trk.length+' seg</span></div>';}).join('');
  box.innerHTML=head+rows;box.style.display='';
}
function mpptMapHtml(g){
  var inputs=[];g.trk.forEach(function(ti){var t=L.trackers[ti],ns=strPerTrk(t);for(var s=0;s<ns;s++)inputs.push(t.id);});   // strings del inversor, en orden de seguidor
  var html='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-top:6px">';
  for(var m=0;m<12;m++){var a=inputs[m*2],b=inputs[m*2+1];
    html+='<div style="border:1px solid var(--line2);border-radius:6px;padding:3px 5px"><div style="color:var(--tx2);font-size:10px">MPPT '+(m+1)+'</div>'
      +'<div style="font-size:10.5px">A '+(a?'<span style="color:#7be0a8">●</span> '+a.split(".").slice(-1):'<span style="color:#445">○</span>')+'</div>'
      +'<div style="font-size:10.5px">B '+(b?'<span style="color:#7be0a8">●</span> '+b.split(".").slice(-1):'<span style="color:#445">○</span>')+'</div></div>';}
  html+='</div>';return html;
}
function openFicha(key){
  var g=INVH[key];if(!g){return;}INVSEL=key;
  if(!$('cbInv').checked){$('cbInv').checked=true;$('cbElec').checked=false;$('cbPile').checked=false;syncLayerLegends();}
  var nT=g.trk.length,nStr=0,dcL=0;
  g.trk.forEach(function(ti){var t=L.trackers[ti];nStr+=strPerTrk(t);dcL+=Math.hypot(t.x-g.x,t.n-g.n);});
  var mods=(SPEC&&SPEC.mods)||28,wmod=(SPEC&&SPEC.wmod)||0,nMods=nStr*mods,kwp=wmod?(nMods*wmod/1000):0;
  var f=$('fichaInv');
  f.innerHTML='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><b style="font-size:14px">'+g.label+'</b>'
    +'<span style="background:'+g.color+';width:12px;height:12px;border-radius:3px;display:inline-block"></span>'
    +'<span style="margin-left:auto;cursor:pointer;color:var(--tx2);font-size:15px" onclick="closeFicha()">✕</span></div>'
    +'<div style="color:var(--accent);font-weight:700;margin-bottom:4px">Sungrow SG350HX · 12 MPPT</div>'
    +'<div><span style="color:var(--tx2)">Seguidores:</span> <b>'+nT+'</b> ('+g.trk.map(function(ti){return L.trackers[ti].id.split(".").slice(-1);}).join(", ")+')</div>'
    +'<div><span style="color:var(--tx2)">Strings (est.):</span> <b>'+nStr+'</b> · <span style="color:var(--tx2)">mód/string:</span> '+mods+(nMods?' · <span style="color:var(--tx2)">mód:</span> '+nMods:'')+'</div>'
    +(kwp?'<div><span style="color:var(--tx2)">Potencia DC (est.):</span> <b>'+kwp.toFixed(1)+' kWp</b></div>':'')
    +'<div><span style="color:var(--tx2)">Cableado DC (est.):</span> ~'+Math.round(dcL)+' m · <span style="color:var(--tx2)">MC4:</span> '+(nStr*2)+'</div>'
    +'<div style="color:var(--tx2);font-size:11px;margin-top:7px">Asignación MPPT (estimada · 2 strings/MPPT)</div>'
    +mpptMapHtml(g)
    +'<div style="color:var(--tx2);font-size:10.5px;margin-top:6px">El detalle exacto de strings / circuitos / cable saldrá del string-schedule de Xamai.</div>';
  f.style.display='';
  if(g.x!=null){view.x=g.x;view.n=g.n;if(view.scale<0.6)view.scale=0.6;}
  draw();
}
function closeFicha(){INVSEL=null;var f=$('fichaInv');if(f)f.style.display='none';draw();}
function syncLayerLegends(){buildElecLegend();buildPileLegend();buildInvLegend();}

/* ===== capa PILE REVEAL: hincado de cada pilote desde el relieve real (DEM) =====
   Mismo modelo que el 3D (tubo con pendiente acotada + recubrimiento mínimo). Online (DEM). */
var DEM=function(z,x,y){return "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/"+z+"/"+x+"/"+y+".png";};
var dem=null,demImg=null,demReady=false,demLoading=false,REVMIN=1,REVMAX=2;
async function demMosaic(z,latN,latS,lonW,lonE){
  var xmin=Math.floor(lon2txf(lonW,z)),xmax=Math.floor(lon2txf(lonE,z));
  var ymin=Math.floor(lat2tyf(latN,z)),ymax=Math.floor(lat2tyf(latS,z));
  var W=(xmax-xmin+1)*256,H=(ymax-ymin+1)*256;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var tasks=[],ok=0;
  for(var tx=xmin;tx<=xmax;tx++)for(var ty=ymin;ty<=ymax;ty++){(function(tx,ty){
    tasks.push(loadImg(DEM(z,tx,ty)).then(function(im){ctx.drawImage(im,(tx-xmin)*256,(ty-ymin)*256);ok++;}).catch(function(){}));})(tx,ty);}
  await Promise.all(tasks);
  return {ctx:ctx,W:W,H:H,z:z,xmin:xmin,ymin:ymin,ok:ok,px:function(lat,lon){return {x:(lon2txf(lon,z)-xmin)*256,y:(lat2tyf(lat,z)-ymin)*256};}};
}
function elevAt(lat,lon){ if(!demImg)return 0; var p=dem.px(lat,lon),W=dem.W,H=dem.H,d=demImg.data;   // bilineal (igual que el 3D)
  var fx=Math.max(0,Math.min(W-1,p.x)),fy=Math.max(0,Math.min(H-1,p.y)),x0=Math.floor(fx),y0=Math.floor(fy),x1=Math.min(W-1,x0+1),y1=Math.min(H-1,y0+1),tx=fx-x0,ty=fy-y0;
  function g(ix,iy){var i=(iy*W+ix)*4;return d[i]*256+d[i+1]+d[i+2]/256;}
  return (g(x0,y0)*(1-tx)+g(x1,y0)*tx)*(1-ty)+(g(x0,y1)*(1-tx)+g(x1,y1)*tx)*ty-32768; }
function reliefCss(t){ t=Math.max(0,Math.min(1,t));   // rampa idéntica a la del 3D (índigo→azul→verde→ocre→rojo)
  var s=[[0,.17,.10,.30],[.25,.16,.43,.59],[.5,.16,.62,.56],[.7,.91,.77,.42],[.85,.90,.44,.32],[1,.84,.16,.16]],r=[.84,.16,.16];
  for(var i=1;i<s.length;i++){if(t<=s[i][0]){var a=s[i-1],b=s[i],f=(t-a[0])/(b[0]-a[0]);r=[a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f,a[3]+(b[3]-a[3])*f];break;}}
  return 'rgb('+Math.round(255*r[0])+','+Math.round(255*r[1])+','+Math.round(255*r[2])+')'; }
var CL=0.16,CMIN=1.0;   // tope de pendiente del tubo (~9°) y recubrimiento mínimo (m)
function computeReveal(){
  if(!demReady||!L||!L.trackers)return;
  var mods=(SPEC&&SPEC.mods)||L.mods||28,zMul=mods/28,zb=[-28,-9,9,28];
  REVMIN=1e9;REVMAX=-1e9;
  for(var i=0;i<L.trackers.length;i++){var t=L.trackers[i],medio=/^medio/i.test(t.t||''),lonC=lon0+t.x/mPerLon,zs=[],keys=[],kmax=-1e9,k;
    for(k=0;k<zb.length;k++){var z=zb[k]*zMul;if(medio&&Math.abs(z)>16)continue;zs.push(z);}
    var halfL=medio?16:31;
    var gN=elevAt(lat0+(t.n+halfL)/mPerLat,lonC),gS=elevAt(lat0+(t.n-halfL)/mPerLat,lonC);
    var tilt=Math.max(-CL,Math.min(CL,(gN-gS)/(2*halfL)));                                  // pendiente del tubo (acotada), del relieve N-S
    for(k=0;k<zs.length;k++){var key=elevAt(lat0+(t.n+zs[k])/mPerLat,lonC)-tilt*zs[k];keys.push(key);if(key>kmax)kmax=key;}
    var rev=[],rmax=-1e9;for(k=0;k<keys.length;k++){var rv=CMIN+kmax-keys[k];rev.push(rv);if(rv>rmax)rmax=rv;if(rv<REVMIN)REVMIN=rv;if(rv>REVMAX)REVMAX=rv;}   // tubo al recubrimiento mínimo del pilote más somero; el resto sobresale más
    t._zs=zs;t._rev=rev;t._revMax=rmax;}
  if(!(REVMAX>REVMIN))REVMAX=REVMIN+1;
}
function ensureDem(){
  if(demReady||demLoading||OFFLINE||!L)return;
  demLoading=true;setStatus('descargando relieve (pile reveal)…');
  (async function(){ try{
    var x0=1e9,x1=-1e9,n0=1e9,n1=-1e9;L.trackers.forEach(function(t){if(t.x<x0)x0=t.x;if(t.x>x1)x1=t.x;if(t.n<n0)n0=t.n;if(t.n>n1)n1=t.n;});
    var marg=80,hx=Math.max(Math.abs(x0),Math.abs(x1))+marg,hz=Math.max(Math.abs(n0),Math.abs(n1))+marg;
    var lonW=lon0-hx/mPerLon,lonE=lon0+hx/mPerLon,latS=lat0-hz/mPerLat,latN=lat0+hz/mPerLat,wide=Math.max(2*hx,2*hz),dz=(wide>1500)?15:14;
    dem=await demMosaic(dz,latN,latS,lonW,lonE);demImg=dem.ctx.getImageData(0,0,dem.W,dem.H);demReady=true;
    computeReveal();buildPileLegend();draw();
    setStatus('<b>'+L.trackers.length+'</b> seguidores · pile reveal '+REVMIN.toFixed(2)+'–'+REVMAX.toFixed(2)+' m');
  }catch(e){demLoading=false;demReady=false;buildPileLegend();setStatus('<span class="err">relieve no disponible (CORS o red)</span>');} })();
}
function buildPileLegend(){
  var box=$('legPile');if(!box)return;
  if(!$('cbPile').checked){box.style.display='none';return;}
  $('legStatic').style.display='none';$('legElec').style.display='none';
  if(!demReady){box.innerHTML='<div style="color:var(--tx2)">'+(OFFLINE?'⛌ relieve no disponible sin conexión':'descargando relieve…')+'</div>';box.style.display='';return;}
  var ramp='';for(var i=0;i<=6;i++)ramp+='<span style="display:inline-block;width:15px;height:10px;background:'+reliefCss(i/6)+'"></span>';
  box.innerHTML='<div style="color:#eaf4ff;margin-bottom:4px">Pile reveal · '+(L.trackers?L.trackers.length:0)+' seguidores</div>'+ramp+'<div style="margin-top:3px">'+REVMIN.toFixed(2)+' m → '+REVMAX.toFixed(2)+' m <span style="color:var(--tx2)">(suelo→tubo)</span></div>';
  box.style.display='';
}

var cv=$('cv'),ctx=cv.getContext('2d'),DPR=Math.min(devicePixelRatio||1,2);
var L=null,lat0=0,lon0=0,mPerLat=111320,mPerLon=85000,sat=null,satBox=null;
var view={x:0,n:0,scale:1};   // x,n = punto del mundo (m) en el centro de pantalla; scale = px/m
var W=0,H=0;
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);draw();}
addEventListener('resize',resize);

function w2sx(x){return W/2+(x-view.x)*view.scale;}
function w2sy(n){return H/2-(n-view.n)*view.scale;}
function s2wx(sx){return view.x+(sx-W/2)/view.scale;}
function s2wn(sy){return view.n-(sy-H/2)/view.scale;}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0b0f14';ctx.fillRect(0,0,W,H);
  // satélite (imagen del mosaico colocada en coords mundo)
  if(sat&&satBox&&$('cbSat').checked){
    var dx=w2sx(satBox.x0),dy=w2sy(satBox.n1),dw=(satBox.x1-satBox.x0)*view.scale,dh=(satBox.n1-satBox.n0)*view.scale;
    ctx.imageSmoothingEnabled=true;
    try{ctx.drawImage(sat.canvas,dx,dy,dw,dh);}catch(e){}
  } else { ctx.fillStyle='#11161d';ctx.fillRect(0,0,W,H); }
  if(!L)return;
  // seguidores
  if($('cbTrk').checked){
    var s=view.scale, pile=$('cbPile').checked&&demReady, inv=$('cbInv').checked&&hasInv(), rng=(REVMAX-REVMIN)||1;
    for(var i=0;i<L.trackers.length;i++){var t=L.trackers[i];
      var medio=/^medio/i.test(t.t||'');
      var halfL=(medio?16:31),halfW=3.2;   // semilargo (N-S) y semiancho (E-W) aproximados
      var cxp=w2sx(t.x),cyp=w2sy(t.n),lp=halfL*s,wp=Math.max(0.8,halfW*s);
      if(cxp<-50||cxp>W+50||cyp<-50||cyp>H+50)continue;
      ctx.fillStyle=(inv&&t._inv&&INVH[t._inv])?INVH[t._inv].color:(pile&&t._revMax!=null)?reliefCss((t._revMax-REVMIN)/rng):(($('cbElec').checked&&t._g!=null&&ECOL[t._g])?ECOL[t._g]:'#3a78d6');   // prioridad: inversor → pile reveal → eléctrico (NCU) → azul
      ctx.fillRect(cxp-wp,cyp-lp,2*wp,2*lp);
      if(pile){ if(t._rev&&s>1.2){var dr=Math.max(1.6,s*0.9);for(var k=0;k<t._zs.length;k++){var dyk=w2sy(t.n+t._zs[k]);ctx.beginPath();ctx.arc(cxp,dyk,dr,0,7);ctx.fillStyle=reliefCss((t._rev[k]-REVMIN)/rng);ctx.fill();ctx.lineWidth=1;ctx.strokeStyle='rgba(8,12,18,.7)';ctx.stroke();} } }   // de cerca: un punto por pilote, coloreado por su propio hincado
      else if(!inv && s>0.9){ctx.strokeStyle='rgba(10,16,24,.6)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cxp,cyp-lp);ctx.lineTo(cxp,cyp+lp);ctx.stroke();}   // eje del tubo
    }
  }
  // capa INVERSORES: cableado string→inversor + símbolo del DWG + etiqueta
  if($('cbInv').checked&&hasInv()){
    for(var gi=0;gi<INVG.length;gi++){var g=INVG[gi],ix=w2sx(g.x),iy=w2sy(g.n),sel=(INVSEL===g.key);   // trunk seguidor→inversor (las "líneas rojas" del plano)
      ctx.strokeStyle=sel?'rgba(255,90,90,.9)':g.colorA;ctx.lineWidth=sel?1.6:1;ctx.beginPath();
      for(var ti=0;ti<g.trk.length;ti++){var t=L.trackers[g.trk[ti]];ctx.moveTo(w2sx(t.x),w2sy(t.n));ctx.lineTo(ix,iy);}
      ctx.stroke();}
    if(L.inverters){ctx.strokeStyle='rgba(234,244,255,.45)';ctx.lineWidth=1;ctx.beginPath();   // rectángulos de los inversores (del DWG)
      for(var si=0;si<L.inverters.length;si++){var seg=L.inverters[si];if(seg&&seg.length>=2){ctx.moveTo(w2sx(seg[0][0]),w2sy(seg[0][1]));ctx.lineTo(w2sx(seg[1][0]),w2sy(seg[1][1]));}}
      ctx.stroke();}
    for(var gi=0;gi<INVG.length;gi++){var g=INVG[gi],ix=w2sx(g.x),iy=w2sy(g.n),sel=(INVSEL===g.key);   // marcador + etiqueta del inversor
      ctx.beginPath();ctx.arc(ix,iy,sel?6:4,0,7);ctx.fillStyle=sel?'#ff5a5a':g.color;ctx.fill();ctx.lineWidth=1.5;ctx.strokeStyle='#0b0f14';ctx.stroke();
      if($('cbLbl').checked||sel){ctx.font='11px ui-monospace,monospace';ctx.fillStyle='#eaf4ff';ctx.strokeStyle='rgba(11,15,20,.85)';ctx.lineWidth=3;ctx.strokeText(g.label,ix+7,iy+4);ctx.fillText(g.label,ix+7,iy+4);}}
  }
  // NCUs y meteo
  if($('cbNcu').checked){
    drawMarks(L.ncus||[],'#36D399',9);
    drawMarks(L.meteo||[],'#e3c149',7);
    drawMarks(L.reps||[],'#c98bff',6);
  }
  // escala
  drawScaleBar();
}
function drawMarks(arr,col,r){
  var lbl=$('cbLbl').checked;
  for(var i=0;i<arr.length;i++){var m=arr[i],sx=w2sx(m.x),sy=w2sy(m.n);
    if(sx<-30||sx>W+30||sy<-30||sy>H+30)continue;
    ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.fillStyle=col;ctx.fill();ctx.lineWidth=2;ctx.strokeStyle='#0b0f14';ctx.stroke();
    if(lbl&&m.name){ctx.font='12px ui-monospace,monospace';ctx.fillStyle='#eaf4ff';ctx.strokeStyle='rgba(11,15,20,.85)';ctx.lineWidth=3;ctx.strokeText(m.name,sx+r+3,sy+4);ctx.fillText(m.name,sx+r+3,sy+4);}
  }
}
function drawScaleBar(){
  // barra de escala: elige una longitud "redonda" ~120 px
  var targetPx=120,m=targetPx/view.scale;
  var pow=Math.pow(10,Math.floor(Math.log10(m))),f=m/pow,nice=(f<1.5?1:f<3.5?2:f<7.5?5:10)*pow;
  var px=nice*view.scale;
  var x0=18,y0=H-22;
  ctx.strokeStyle='#eaf4ff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0+px,y0);ctx.moveTo(x0,y0-5);ctx.lineTo(x0,y0+5);ctx.moveTo(x0+px,y0-5);ctx.lineTo(x0+px,y0+5);ctx.stroke();
  ctx.font='12px ui-monospace,monospace';ctx.fillStyle='#eaf4ff';ctx.fillText(nice>=1000?(nice/1000)+' km':nice+' m',x0,y0-9);
}

function fit(){
  if(!L||!L.trackers.length)return;
  var x0=1e9,x1=-1e9,n0=1e9,n1=-1e9;
  L.trackers.forEach(function(t){if(t.x<x0)x0=t.x;if(t.x>x1)x1=t.x;if(t.n<n0)n0=t.n;if(t.n>n1)n1=t.n;});
  var pad=60,sx=W/((x1-x0)+2*pad),sn=H/((n1-n0)+2*pad);
  view.scale=Math.min(sx,sn);view.x=(x0+x1)/2;view.n=(n0+n1)/2;draw();
}

// interacción
var drag=null,_downX=0,_downY=0;
cv.addEventListener('pointerdown',function(e){drag={sx:e.clientX,sy:e.clientY,vx:view.x,vn:view.n};_downX=e.clientX;_downY=e.clientY;cv.classList.add('drag');cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',function(e){
  if(drag){view.x=drag.vx-(e.clientX-drag.sx)/view.scale;view.n=drag.vn+(e.clientY-drag.sy)/view.scale;draw();return;}
  hover(e);
});
cv.addEventListener('pointerup',function(e){drag=null;cv.classList.remove('drag');});
cv.addEventListener('pointercancel',function(){drag=null;cv.classList.remove('drag');});
cv.addEventListener('click',function(e){   // modo inversor: clic (sin arrastrar) en un inversor o seguidor → ficha
  if(!$('cbInv').checked||!hasInv()||!L)return;
  if(Math.hypot(e.clientX-_downX,e.clientY-_downY)>6)return;   // fue un arrastre, no un clic
  var best=null,bd=18;
  for(var i=0;i<INVG.length;i++){var g=INVG[i],d=Math.hypot(w2sx(g.x)-e.clientX,w2sy(g.n)-e.clientY);if(d<bd){bd=d;best=g.key;}}
  if(!best){var bd2=20;for(var i=0;i<L.trackers.length;i++){var t=L.trackers[i];if(t._inv==null)continue;var d=Math.hypot(w2sx(t.x)-e.clientX,w2sy(t.n)-e.clientY);if(d<bd2){bd2=d;best=t._inv;}}}
  if(best)openFicha(best); else closeFicha();
});
cv.addEventListener('wheel',function(e){e.preventDefault();
  var wx=s2wx(e.clientX),wn=s2wn(e.clientY);   // mundo bajo el cursor
  var f=Math.exp(-e.deltaY*0.0014);view.scale=Math.max(0.02,Math.min(20,view.scale*f));
  view.x=wx-(e.clientX-W/2)/view.scale;view.n=wn+(e.clientY-H/2)/view.scale;   // mantener el punto bajo el cursor
  draw();
},{passive:false});
function hover(e){
  if(!L){return;}
  var tip=$('tip'),best=null,bd=14;
  function chk(arr,kind){for(var i=0;i<arr.length;i++){var m=arr[i],d=Math.hypot(w2sx(m.x)-e.clientX,w2sy(m.n)-e.clientY);if(d<bd){bd=d;best={name:m.name,kind:kind};}}}
  chk(L.ncus||[],'NCU');chk(L.meteo||[],'meteo');chk(L.reps||[],'repetidor');
  if(!best && $('cbElec').checked && L.trackers){   // en modo eléctrico: identifica el seguidor bajo el cursor (id · NCU · gateway)
    var bt=null,bd2=22;
    for(var i=0;i<L.trackers.length;i++){var t=L.trackers[i];var d=Math.hypot(w2sx(t.x)-e.clientX,w2sy(t.n)-e.clientY);if(d<bd2){bd2=d;bt=t;}}
    if(bt){var nm='';for(var k=0;k<EGROUPS.length;k++)if(EGROUPS[k].key===bt._g){nm=EGROUPS[k].name;break;}
      tip.innerHTML='<b>'+(bt.id||'seguidor')+'</b><br>'+nm+(bt.gw!=null?' · GW '+bt.gw:'');
      tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';tip.style.opacity=1;return;}
  }
  if(!best && $('cbInv').checked && hasInv() && L.trackers){   // modo inversor: seguidor bajo el cursor → su inversor
    var bt=null,bd2=22;for(var i=0;i<L.trackers.length;i++){var t=L.trackers[i];if(t._inv==null)continue;var d=Math.hypot(w2sx(t.x)-e.clientX,w2sy(t.n)-e.clientY);if(d<bd2){bd2=d;bt=t;}}
    if(bt){tip.innerHTML='<b>'+(bt.id||'seguidor')+'</b><br>'+(INVH[bt._inv]?INVH[bt._inv].label:'I-'+bt._inv)+' <span style="color:#9bb0c6">· clic para ficha</span>';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';tip.style.opacity=1;return;}
  }
  if(best&&best.name){tip.innerHTML='<b>'+best.name+'</b><br>'+best.kind;tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';tip.style.opacity=1;}
  else tip.style.opacity=0;
}

['cbSat','cbTrk','cbNcu','cbLbl'].forEach(function(id){$(id).onchange=draw;});
$('cbElec').onchange=function(){ if(this.checked){$('cbPile').checked=false;$('cbInv').checked=false;closeFicha();} syncLayerLegends();draw(); };   // eléctrico, pile reveal e inversor son excluyentes
$('cbPile').onchange=function(){ if(this.checked){$('cbElec').checked=false;$('cbInv').checked=false;closeFicha();ensureDem();} syncLayerLegends();draw(); };
$('cbInv').onchange=function(){ if(this.checked){$('cbElec').checked=false;$('cbPile').checked=false;} else closeFicha(); syncLayerLegends();draw(); };
$('fit').onclick=fit;
if(PLANT==='custom'&&$('plantSel')&&!$('plantSel').querySelector('option[value="custom"]')){var _co=document.createElement('option');_co.value='custom';_co.textContent='✚ Planta nueva';$('plantSel').appendChild(_co);}
$('plantSel').value=PLANT;$('plantSel').onchange=function(){if(this.value==='elburgo'){location.href='index.html';return;}var u=new URL(location.href);u.searchParams.set('planta',this.value);location.href=u.href;};   // El Burgo: su 2D es el visor de cobertura Zigbee (index.html)
$('link3d').href='terreno.html?planta='+PLANT;
(function(){var b=$('offBtn');if(!b)return;b.textContent=OFFLINE?'⛌ Sin conexión':'◑ Online';b.style.color=OFFLINE?'#F6A623':'#9bb0c6';b.onclick=function(){try{localStorage.setItem('cobertura_offline',OFFLINE?'0':'1');}catch(e){}location.reload();};})();

async function build(){
  resize();
  setStatus('cargando '+PLANTS[PLANT].title+'…');
  try{L=(PLANT==='custom')?JSON.parse(localStorage.getItem('cobertura_layout')||'null'):await (await fetch(PLANTS[PLANT].file,{cache:'no-store'})).json(); if(!L)throw new Error('sin layout');}
  catch(e){setStatus('<span class="err">'+((PLANT==='custom')?'No hay ningún mapa en memoria. Genéralo en «Nuevo mapa de cobertura».':'No se pudo cargar '+PLANTS[PLANT].file)+'</span>');return;}
  lat0=L.clat;lon0=L.clon;mPerLon=111320*Math.cos(lat0*DEG);
  assignElec();buildElecLegend();   // capa eléctrica lista (offline, desde el layout)
  assignInv();buildInvLegend();      // capa de inversores (El Burgo: del DWG vía ids + invlab)
  // extensión para satélite
  var x0=1e9,x1=-1e9,n0=1e9,n1=-1e9;
  L.trackers.forEach(function(t){if(t.x<x0)x0=t.x;if(t.x>x1)x1=t.x;if(t.n<n0)n0=t.n;if(t.n>n1)n1=t.n;});
  var marg=80,hx=Math.max(Math.abs(x0),Math.abs(x1))+marg,hz=Math.max(Math.abs(n0),Math.abs(n1))+marg;
  var lonW=lon0-hx/mPerLon,lonE=lon0+hx/mPerLon,latS=lat0-hz/mPerLat,latN=lat0+hz/mPerLat;
  var wide=Math.max(2*hx,2*hz);
  var z=Math.max(15,Math.min(19,Math.round(Math.log2(7*40075016*Math.cos(lat0*DEG)/wide))));   // ~7 teselas/lado
  fit();draw();
  if(OFFLINE){ setStatus('<b>'+L.trackers.length+'</b> seguidores · '+(L.ncus?L.ncus.length:0)+' NCU · '+(L.meteo?L.meteo.length:0)+' meteo\n⛌ modo sin conexión (sin satélite)'); return; }   // OFFLINE: no se descarga el satélite (cero llamadas externas)
  setStatus('<b>'+L.trackers.length+'</b> seguidores · '+(L.ncus?L.ncus.length:0)+' NCU · '+(L.meteo?L.meteo.length:0)+' meteo\ndescargando satélite…');
  try{
    sat=await mosaic(z,latN,latS,lonW,lonE);
    // bbox del mosaico en coords mundo (m), a partir de los bordes de las teselas
    var bl=tx2lon(sat.xmin,z),br=tx2lon(sat.xmax+1,z),bt=ty2lat(sat.ymin,z),bb=ty2lat(sat.ymax+1,z);
    satBox={x0:(bl-lon0)*mPerLon,x1:(br-lon0)*mPerLon,n0:(bb-lat0)*mPerLat,n1:(bt-lat0)*mPerLat};
    draw();
    setStatus('<b>'+L.trackers.length+'</b> seguidores · '+(L.ncus?L.ncus.length:0)+' NCU · '+(L.meteo?L.meteo.length:0)+' meteo\nsatélite: '+sat.ok+' teselas (z'+z+')');
  }catch(e){ setStatus('<b>'+L.trackers.length+'</b> seguidores (satélite no disponible)'); }
}
build();
</script></body></html>
